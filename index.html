<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>GymLog</title>
  <style>
    :root {
      --bg:#f2f2f2; --white:#fff; --border:#e0e0e0; --border2:#c8c8c8;
      --accent:#1a56db; --accentl:#e8effd;
      --text:#111; --text2:#555; --text3:#999;
      --red:#dc2626; --redl:#fef2f2; --green:#16a34a;
      --r:8px; --r2:5px; --shadow:0 1px 4px rgba(0,0,0,.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
    button{cursor:pointer;font-family:Arial,Helvetica,sans-serif;border:none;outline:none;transition:all .15s}
    input,select,textarea{font-family:Arial,Helvetica,sans-serif;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:var(--r2);padding:8px 10px;font-size:14px;outline:none;transition:border-color .15s;width:100%}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentl)}
    textarea{resize:vertical;min-height:54px}

    /* ── SIGN IN ── */
    #screen-setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
    .signin-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:44px 28px;width:100%;max-width:320px;box-shadow:var(--shadow);text-align:center}
    .signin-logo{font-size:28px;font-weight:700;margin-bottom:4px}
    .signin-logo span{color:var(--accent)}
    .signin-sub{color:var(--text3);font-size:13px;margin-bottom:36px}
    .btn-google{width:100%;padding:12px 16px;background:var(--white);color:var(--text);font-weight:700;font-size:14px;border-radius:var(--r2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:var(--shadow)}
    .btn-google:hover{border-color:var(--accent);background:var(--accentl)}
    .btn-google svg{flex-shrink:0}
    .signin-access{margin-top:18px;font-size:12px;color:var(--text3)}

    /* ── APP ── */
    #screen-app{display:none;min-height:100vh;padding-bottom:60px}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100}
    .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;color:var(--text3);font-size:10px;font-weight:700;padding:6px 0;border-radius:0}
    .bn-item .bn-icon{font-size:19px;line-height:1}
    .bn-item.active{color:var(--accent)}

    .top-bar{position:sticky;top:0;background:var(--white);border-bottom:1px solid var(--border);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;z-index:90}
    .top-bar-title{font-size:16px;font-weight:700}
    .top-bar-back{display:flex;align-items:center;gap:4px;background:transparent;color:var(--accent);font-size:14px;font-weight:700;padding:4px 0}
    .top-bar-action{background:var(--accent);color:#fff;font-size:13px;font-weight:700;padding:7px 14px;border-radius:var(--r2)}
    .top-bar-action:hover{background:#1447c0}

    /* User avatar in top bar */
    .user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--border);cursor:pointer}
    .user-avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--border)}

    /* Profile dropdown */
    .profile-menu{position:fixed;top:54px;right:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:200;min-width:220px;padding:14px}
    .profile-menu.hidden{display:none}
    .pm-user{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .pm-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .pm-avatar-ph{width:40px;height:40px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .pm-name{font-size:14px;font-weight:700;line-height:1.2}
    .pm-email{font-size:11px;color:var(--text3)}
    .pm-role{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;margin-top:2px}
    .pm-role.admin{background:#fef9c3;color:#a16207}
    .pm-role.user{background:var(--accentl);color:var(--accent)}
    .pm-btn{width:100%;text-align:left;background:transparent;color:var(--text2);font-size:13px;padding:7px 0;border-radius:0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
    .pm-btn:last-child{border-bottom:none;padding-bottom:0}
    .pm-btn:hover{color:var(--text)}
    .pm-signout{color:var(--red)!important}
    .pm-overlay{position:fixed;inset:0;z-index:199}
    .pm-overlay.hidden{display:none}

    /* Admin view-as banner */
    .admin-banner{background:#fef9c3;border-bottom:1px solid #fde68a;padding:6px 14px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:#a16207}
    .admin-banner select{width:auto;padding:3px 8px;font-size:12px;background:#fffbeb;border-color:#fde68a;color:#a16207;font-weight:700}
    .admin-banner.hidden{display:none}

    .view{display:none}
    .view.active{display:block}
    .view-pad{padding:14px}
    .pb{height:14px}
    .sec-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

    /* ── CLIENTS ── */
    .clients-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .client-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:border-color .15s}
    .client-card:hover{border-color:var(--accent)}
    .cc-avatar{width:40px;height:40px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .cc-info{flex:1;min-width:0}
    .cc-name{font-size:15px;font-weight:700}
    .cc-meta{font-size:12px;color:var(--text3)}
    .cc-stats{display:flex;gap:14px;margin-top:4px}
    .cc-stat{font-size:11px;color:var(--text2)}
    .cc-stat strong{color:var(--text)}
    .cc-arrow{color:var(--text3);font-size:20px}
    .add-client-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
    .form-group{margin-bottom:10px}
    .form-group:last-child{margin-bottom:0}
    .form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}

    /* Edit client modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:flex;align-items:flex-end;justify-content:center}
    .modal-overlay.hidden{display:none}
    .modal-sheet{background:var(--white);border-radius:16px 16px 0 0;padding:24px 20px 32px;width:100%;max-width:500px;box-shadow:0 -4px 24px rgba(0,0,0,.12)}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
    .modal-close{background:transparent;color:var(--text3);font-size:20px;padding:2px 6px;border-radius:var(--r2)}
    .modal-close:hover{color:var(--text)}

    /* ── CLIENT DETAIL ── */
    .session-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
    .sess-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
    .sess-item-header{display:flex;align-items:center;gap:6px;padding:10px 12px;cursor:pointer;user-select:none}
    .sess-item-header:active{background:var(--bg)}
    .sess-date{font-size:13px;font-weight:700;white-space:nowrap;margin-right:2px}
    .sess-summary{display:flex;gap:4px;flex-wrap:wrap;flex:1;min-width:0}
    .bp-sum-tag{background:var(--accentl);color:var(--accent);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
    .bp-sum-tag em{font-style:normal;color:var(--text2);margin-left:2px}
    .sess-hdr-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
    .note-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:4px}
    .btn-icon-sm{background:transparent;color:var(--text3);font-size:15px;padding:3px 5px;line-height:1;border-radius:var(--r2)}
    .btn-icon-sm:hover{color:var(--accent);background:var(--accentl)}
    .btn-icon-del:hover{color:var(--red)!important;background:var(--redl)!important}
    .sess-chevron{color:var(--text3);font-size:11px;transition:transform .2s;margin-left:1px}
    .sess-item.open .sess-chevron{transform:rotate(180deg)}
    .sess-body{display:none;border-top:1px solid var(--border)}
    .sess-item.open .sess-body{display:block}
    .sess-notes-row{padding:7px 12px;background:#fffbeb;border-bottom:1px solid #fef3c7;font-size:12px;color:#92400e;display:flex;gap:5px}
    .sess-notes-row span{flex:1}
    .wo-row{display:flex;align-items:baseline;gap:0;padding:6px 12px;border-bottom:1px solid var(--border)}
    .wo-row:last-child{border-bottom:none}
    .wo-left{min-width:72px;max-width:72px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding-top:1px;flex-shrink:0}
    .wo-right{flex:1;min-width:0}
    .wo-name{font-size:13px;font-weight:700;margin-bottom:3px}
    .sets-chips{display:flex;flex-wrap:wrap;gap:3px}
    .set-chip{background:var(--bg);border:1px solid var(--border);font-size:11px;color:var(--text);padding:1px 7px;border-radius:20px;font-weight:600}

    /* ── LOG ── */
    .log-form{padding:12px;display:flex;flex-direction:column;gap:10px}
    .log-row{display:flex;gap:8px}
    .log-row .form-group{flex:1;margin-bottom:0}
    .wo-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
    .wo-card-top{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border)}
    .wo-card-top select{flex:1;font-size:13px;padding:5px 7px}
    .btn-rm{background:transparent;color:var(--text3);font-size:16px;padding:2px 5px;line-height:1;flex-shrink:0}
    .btn-rm:hover{color:var(--red)}
    .btn-rm:disabled{opacity:.25;cursor:default}
    .sets-area{padding:8px 10px}
    .set-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .set-row:last-child{margin-bottom:0}
    .set-lbl{font-size:11px;font-weight:700;color:var(--text3);min-width:20px;text-align:center}
    .set-inp{flex:1;padding:6px 6px;font-size:14px;text-align:center}
    .set-sep{font-size:12px;color:var(--text3);flex-shrink:0}
    .add-set-link{display:block;text-align:center;padding:5px;color:var(--accent);font-size:12px;font-weight:700;border-top:1px dashed var(--border);background:transparent;width:100%}
    .add-set-link:hover{background:var(--accentl)}
    .add-wo-btn{width:100%;padding:11px;background:var(--white);border:2px dashed var(--border);border-radius:var(--r);color:var(--text2);font-size:13px;font-weight:700}
    .add-wo-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accentl)}
    .save-btn{width:100%;padding:13px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;border-radius:var(--r)}
    .save-btn:hover{background:#1447c0}
    .save-btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-add-sm{background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:7px 12px;border-radius:var(--r2);white-space:nowrap}
    .btn-add-sm:hover{background:#1447c0}

    /* ── WORKOUTS ── */
    .repo-group{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden}
    .repo-group-head{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--bg);border-bottom:1px solid var(--border)}
    .repo-group-name{font-size:13px;font-weight:700}
    .repo-group-count{font-size:11px;color:var(--text3)}
    .repo-chips{padding:9px 11px;display:flex;flex-wrap:wrap;gap:5px}
    .wo-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px}
    .wo-chip button{background:none;color:var(--text3);font-size:13px;padding:0;line-height:1}
    .wo-chip button:hover{color:var(--red)}
    .repo-add-row{padding:7px 11px;border-top:1px dashed var(--border);display:flex;gap:7px}
    .repo-add-row input{flex:1;padding:6px 9px;font-size:13px}

    /* ── PROFILE EDIT ── */
    .profile-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
    .profile-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .profile-pic{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
    .profile-pic-ph{width:56px;height:56px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--border)}
    .profile-info{flex:1}
    .profile-name{font-size:16px;font-weight:700}
    .profile-email{font-size:12px;color:var(--text3)}

    /* Users table (admin) */
    .users-table{width:100%;border-collapse:collapse;font-size:13px}
    .users-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
    .users-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    .users-table tr:last-child td{border-bottom:none}
    .user-row-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;vertical-align:middle}
    .user-row-avatar-ph{width:28px;height:28px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
    .role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;cursor:pointer;border:none}
    .role-badge.admin{background:#fef9c3;color:#a16207}
    .role-badge.user{background:var(--accentl);color:var(--accent)}

    /* Loading / Toast */
    .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;z-index:500}
    .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .5s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #toast{position:fixed;bottom:66px;right:14px;z-index:999;display:flex;flex-direction:column;gap:5px}
    .t-item{background:var(--text);color:#fff;border-radius:var(--r2);padding:9px 14px;font-size:13px;font-weight:600;min-width:160px;animation:slideUp .18s ease}
    .t-item.error{background:var(--red)}
    .t-item.success{background:var(--green)}
    @keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
    .empty-icon{font-size:32px;margin-bottom:8px}
    .empty-txt{font-size:13px}
    .access-denied{text-align:center;padding:60px 20px}
    .access-denied h2{font-size:18px;margin-bottom:8px}
    .access-denied p{font-size:13px;color:var(--text3)}
  </style>
</head>
<body>

<!-- SIGN IN -->
<div id="screen-setup">
  <div class="signin-card">
    <div class="signin-logo">Gym<span>Log</span></div>
    <div class="signin-sub">Personal Trainer Session Tracker</div>
    <button class="btn-google" onclick="handleSignIn()">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
      Sign in with Google
    </button>
    <div class="signin-access">Access is by invitation only</div>
  </div>
</div>

<!-- APP -->
<div id="screen-app">

  <!-- Admin view-as banner -->
  <div class="admin-banner hidden" id="admin-banner">
    ⚡ Admin &nbsp;|&nbsp; Viewing:
    <select id="view-as-sel" onchange="onViewAsChange(this.value)"></select>
  </div>

  <!-- CLIENTS -->
  <div id="view-clients" class="view active">
    <div class="top-bar">
      <div class="top-bar-title">GymLog</div>
      <div id="nav-avatar-wrap" onclick="toggleProfileMenu()"></div>
    </div>
    <div class="view-pad">
      <div class="sec-label">Clients</div>
      <div id="clients-list" class="clients-list"></div>
      <div class="sec-label">Add Client</div>
      <div class="add-client-box">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="nc-name" placeholder="e.g. Priya Kapoor" onkeydown="if(event.key==='Enter')addClient()">
        </div>
        <div class="form-group">
          <label class="form-label">Email <span style="color:var(--red)">*</span></label>
          <input type="email" id="nc-email" placeholder="client@email.com" onkeydown="if(event.key==='Enter')addClient()">
        </div>
        <div class="form-group">
          <label class="form-label">Phone (optional)</label>
          <input type="text" id="nc-phone" placeholder="+91 98000 00000" onkeydown="if(event.key==='Enter')addClient()">
        </div>
        <button class="btn-add-sm" style="width:100%;padding:10px" onclick="addClient()">Add Client</button>
      </div>
      <div class="pb"></div>
    </div>
  </div>

  <!-- CLIENT DETAIL -->
  <div id="view-client-detail" class="view">
    <div class="top-bar">
      <button class="top-bar-back" onclick="navigate('clients')">&#8249; Clients</button>
      <div class="top-bar-title" id="detail-name"></div>
      <button class="top-bar-action" onclick="openLogFor()">+ Log</button>
    </div>
    <div id="sess-list-el" class="session-list"></div>
    <div class="pb"></div>
  </div>

  <!-- LOG -->
  <div id="view-log" class="view">
    <div class="top-bar">
      <button class="top-bar-back" id="log-back-btn" onclick="navigate('clients')">&#8249; Back</button>
      <div class="top-bar-title" id="log-title">Log Session</div>
      <div style="width:54px"></div>
    </div>
    <div class="log-form">
      <div class="log-row">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input type="date" id="sess-date">
        </div>
        <div class="form-group">
          <label class="form-label">Client</label>
          <select id="sess-client"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Session Notes (optional)</label>
        <textarea id="sess-notes" placeholder="e.g. Increased bench by 5kg..."></textarea>
      </div>
      <div>
        <div class="sec-label" style="margin-bottom:8px">Workouts</div>
        <div id="blocks-container"></div>
        <button class="add-wo-btn" onclick="addWoCard()">+ Add Workout</button>
      </div>
      <button class="save-btn" id="btn-save" onclick="saveSession()">Save Session</button>
      <div class="pb"></div>
    </div>
  </div>

  <!-- WORKOUTS -->
  <div id="view-workouts" class="view">
    <div class="top-bar"><div class="top-bar-title">Workout Library</div></div>
    <div id="repo-grid" class="view-pad"></div>
    <div class="pb"></div>
  </div>

  <!-- PROFILE -->
  <div id="view-profile" class="view">
    <div class="top-bar">

<div class="loading-overlay" id="loading" style="display:none"><div class="spinner"></div></div>
<div id="toast"></div>

<script>
// ── CONFIG ──
const CID = '590030292842-dvjun5fmag580q482pfj5v513b1o86no.apps.googleusercontent.com';
const SID = '1APQUzDA1D8cbKz9PJTv4CL-_4_PUQTdgdmcsXTFqDNk';
const DISC   = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
const SH = {U:'Users',C:'Clients',R:'WorkoutRepo',L:'WorkoutLogs',S:'Sessions'};
const BODY_PARTS = ['Chest','Back','Shoulders','Biceps','Triceps','Legs','Glutes','Core','Cardio','Full Body'];
const DEFAULT_REPO = {
  'Chest':    ['Bench Press','Incline Bench Press','Decline Bench Press','Dumbbell Flyes','Cable Crossovers','Push-ups','Chest Dips','Pec Deck'],
  'Back':     ['Deadlift','Pull-ups','Bent-over Row','Lat Pulldown','Seated Cable Row','T-Bar Row','Single-arm Dumbbell Row','Face Pull'],
  'Shoulders':['Barbell Overhead Press','Dumbbell Shoulder Press','Lateral Raises','Front Raises','Rear Delt Flyes','Arnold Press','Upright Row','Cable Lateral Raises'],
  'Biceps':   ['Barbell Curl','Dumbbell Curl','Hammer Curl','Preacher Curl','Concentration Curl','Cable Curl','Incline Dumbbell Curl','Reverse Curl'],
  'Triceps':  ['Tricep Dips','Skull Crushers','Tricep Pushdown','Overhead Tricep Extension','Close Grip Bench Press','Kickbacks','Diamond Push-ups'],
  'Legs':     ['Barbell Squat','Leg Press','Lunges','Leg Extension','Leg Curl','Romanian Deadlift','Calf Raises','Hack Squat','Bulgarian Split Squat','Step-ups'],
  'Glutes':   ['Hip Thrust','Glute Bridge','Cable Kickback','Sumo Squat','Resistance Band Walks'],
  'Core':     ['Plank','Crunches','Russian Twists','Leg Raises','Ab Rollout','Cable Crunch','Bicycle Crunches','Hanging Knee Raises'],
  'Cardio':   ['Treadmill Run','Stationary Bike','Rowing Machine','Jump Rope','Stair Climber','Elliptical','HIIT Sprints'],
  'Full Body':['Clean and Press','Burpees','Kettlebell Swings','Thrusters','Turkish Get-up','Battle Ropes']
};

// ── STATE ──
const S = {
  user:null,           // {email, name, picture, given_name}
  userRole:'user',     // 'user' | 'admin'
  viewAsEmail:null,    // null = own data; for admin: specific email or 'all'
  allUsers:[],         // [{email,name,pictureUrl,role,registeredAt}]
  clients:[], repo:{}, logs:[], sessions:[],
  sess:{date:'',client:'',notes:'',workouts:[]},
  currentClient:null, editingSessionId:null,
  tc:null, gapiOk:false, gisOk:false
};

// ── GAPI ──
window.gapiLoaded = () => {
  gapi.load('client', async () => {
    await gapi.client.init({discoveryDocs:[DISC]});
    S.gapiOk=true; onReady();
  });
};
window.gisLoaded = () => { S.gisOk=true; onReady(); };
function onReady() {
  if (!S.gapiOk||!S.gisOk) return;
  document.getElementById('sess-date').value = today();
  // Auto sign-in if user was previously logged in
  if (localStorage.getItem('gl_authed')==='1') {
    silentSignIn();
  }
}

function silentSignIn() {
  // Show a subtle loading indicator while auto-signing in
  document.getElementById('loading').style.display='flex';
  try {
    S.tc = google.accounts.oauth2.initTokenClient({
      client_id: CID, scope: SCOPES,
      prompt: '',  // no popup — uses existing Google session cookie
      callback: async (resp) => {
        if (resp.error || !resp.access_token) {
          // Silent failed — show sign-in screen normally
          document.getElementById('loading').style.display='none';
          localStorage.removeItem('gl_authed');
          return;
        }
        gapi.client.setToken(resp);
        // Schedule token refresh before expiry (tokens last ~3600s)
        const expiresIn = (resp.expires_in || 3600) - 120; // refresh 2 min early
        setTimeout(silentSignIn, expiresIn * 1000);
        await postAuth();
      }
    });
    S.tc.requestAccessToken({prompt: ''});
  } catch(e) {
    document.getElementById('loading').style.display='none';
    localStorage.removeItem('gl_authed');
  }
}

// ── AUTH ──
function handleSignIn() {
  S.tc = google.accounts.oauth2.initTokenClient({
    client_id:CID, scope:SCOPES,
    callback: async (resp) => {
      if (resp.error) { toast('Auth error: '+resp.error,'error'); return; }
      gapi.client.setToken(resp);
      // Schedule silent refresh
      const expiresIn = (resp.expires_in || 3600) - 120;
      setTimeout(silentSignIn, expiresIn * 1000);
      await postAuth();
    }
  });
  S.tc.requestAccessToken({prompt:'select_account'});
}

async function postAuth() {
  showLoad(true);
  try {
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      {headers:{Authorization:'Bearer '+gapi.client.getToken().access_token}});
    S.user = await r.json();
    await initSheets();
    // Register / load user
    await registerUser();
    // Check if registered (approved)
    if (S.userRole === 'pending') {
      showLoad(false);
      document.getElementById('screen-setup').innerHTML =
        '<div class="access-denied"><h2>Access Pending</h2><p>Your account is awaiting approval.<br>Contact the admin.</p><button class="btn-add-sm" style="margin-top:20px" onclick="handleSignOut()">Sign Out</button></div>';
      return;
    }
    await loadAll();
    document.getElementById('screen-setup').style.display='none';
    document.getElementById('screen-app').style.display='block';
    localStorage.setItem('gl_authed','1');
    renderTopAvatar();
    setupAdminBanner();
    renderClientsList();
  } catch(e) {
    console.error(e);
    localStorage.removeItem('gl_authed');
    toast('Could not connect. Check console.','error');
  }
  finally { showLoad(false); }
}

function handleSignOut() {
  localStorage.removeItem('gl_authed');
  try { google.accounts.oauth2.revoke(gapi.client.getToken().access_token,()=>{}); } catch(_){}
  gapi.client.setToken(null);
  closeProfileMenu();
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-setup').style.display='flex';
}

// ── SHEETS INIT ──
async function initSheets() {
  const meta = await gapi.client.sheets.spreadsheets.get({spreadsheetId:SID});
  const existing = meta.result.sheets.map(s=>s.properties.title);
  const needed = [SH.U,SH.C,SH.R,SH.L,SH.S].filter(n=>!existing.includes(n));
  if (needed.length) {
    await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId:SID,
      resource:{requests:needed.map(title=>({addSheet:{properties:{title}}}))}});
  }
  const headers=[];
  // Users: Email | Name | PictureUrl | Role | RegisteredAt
  if (!existing.includes(SH.U)) headers.push({range:`${SH.U}!A1:E1`,values:[['Email','Name','PictureUrl','Role','RegisteredAt']]});
  if (!existing.includes(SH.C)) headers.push({range:`${SH.C}!A1:E1`,values:[['Name','Phone','Active','TrainerEmail','Email']]});
  if (!existing.includes(SH.R)) headers.push({range:`${SH.R}!A1:B1`,values:[['BodyPart','WorkoutName']]});
  if (!existing.includes(SH.L)) headers.push({range:`${SH.L}!A1:K1`,values:[['LogID','SessionID','SessionDate','ClientName','BodyPart','WorkoutName','SetNum','Reps','WeightKg','LoggedAt','TrainerEmail']]});
  if (!existing.includes(SH.S)) headers.push({range:`${SH.S}!A1:E1`,values:[['SessionID','Date','Client','Notes','TrainerEmail']]});
  if (headers.length) await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:SID,
    resource:{valueInputOption:'USER_ENTERED',data:headers}});
  // Seed workout repo
  const rr = await getVals(`${SH.R}!A2:B`);
  if (!rr||!rr.length) {
    const rows=[];
    for (const [bp,wos] of Object.entries(DEFAULT_REPO)) wos.forEach(w=>rows.push([bp,w]));
    await appendVals(`${SH.R}!A:B`,rows);
  }
}

// ── USER REGISTRATION ──
async function registerUser() {
  const rows = await getVals(`${SH.U}!A2:E`);
  S.allUsers = rows.filter(r=>r[0]).map(r=>({
    email:r[0], name:r[1]||'', pictureUrl:r[2]||'', role:r[3]||'user', registeredAt:r[4]||''
  }));
  const existing = S.allUsers.find(u=>u.email===S.user.email);
  if (existing) {
    S.userRole = existing.role;
    // Update name/pic in case they changed
    const idx = rows.findIndex(r=>r[0]===S.user.email);
    if (idx>=0) await updateVals(`${SH.U}!B${idx+2}:C${idx+2}`,[[S.user.name||S.user.given_name||'',S.user.picture||'']]);
  } else {
    // First ever user → admin; subsequent → user (pending approval = user role)
    const role = S.allUsers.length===0 ? 'admin' : 'user';
    const ts = new Date().toISOString();
    await appendVals(`${SH.U}!A:E`,[[S.user.email, S.user.name||S.user.given_name||'', S.user.picture||'', role, ts]]);
    S.userRole = role;
    // Reload users list
    const rows2 = await getVals(`${SH.U}!A2:E`);
    S.allUsers = rows2.filter(r=>r[0]).map(r=>({email:r[0],name:r[1]||'',pictureUrl:r[2]||'',role:r[3]||'user',registeredAt:r[4]||''}));
  }
}

// ── SHEETS API ──
async function getVals(range) {
  const r=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SID,range});
  return r.result.values||[];
}
async function appendVals(range,values) {
  return gapi.client.sheets.spreadsheets.values.append({spreadsheetId:SID,range,valueInputOption:'USER_ENTERED',resource:{values}});
}
async function updateVals(range,values) {
  return gapi.client.sheets.spreadsheets.values.update({spreadsheetId:SID,range,valueInputOption:'USER_ENTERED',resource:{values}});
}
async function getAllVals(sheet) { return getVals(`${sheet}!A:Z`); }

// ── LOAD (with trainer filtering) ──
async function loadAll() { await Promise.all([loadClients(),loadRepo(),loadLogs(),loadSessions()]); }

function activeEmail() {
  // Which email's data to show
  if (S.userRole!=='admin') return S.user.email;
  if (S.viewAsEmail && S.viewAsEmail!=='all') return S.viewAsEmail;
  return null; // null = all (admin only)
}

async function loadClients() {
  const rows=await getVals(`${SH.C}!A2:E`);
  const email=activeEmail();
  S.clients=rows.filter(r=>r[0]&&r[2]!=='false')
    .filter(r=>!email || (r[3]||'')=== email || r[3]==='' )
    .map((r,_,arr)=>({name:r[0],phone:r[1]||'',trainerEmail:r[3]||'',clientEmail:r[4]||'',_rowIdx:arr.indexOf(r)}));
}
async function loadRepo() {
  const rows=await getVals(`${SH.R}!A2:B`); S.repo={};
  rows.forEach(r=>{if(!r[0]||!r[1])return;const bp=r[0].trim(),w=r[1].trim();if(!S.repo[bp])S.repo[bp]=[];S.repo[bp].push(w);});
}
async function loadLogs() {
  const rows=await getVals(`${SH.L}!A2:K`);
  const email=activeEmail();
  S.logs=rows.filter(r=>r.length>=7).map(r=>{
    if(r.length>=11) return{logId:r[0],sessionId:r[1],date:r[2],client:r[3],bodyPart:r[4],workout:r[5],setNum:r[6],reps:r[7],weight:r[8],loggedAt:r[9],trainerEmail:r[10]||''};
    if(r.length>=10) return{logId:r[0],sessionId:r[1],date:r[2],client:r[3],bodyPart:r[4],workout:r[5],setNum:r[6],reps:r[7],weight:r[8],loggedAt:r[9],trainerEmail:''};
    return{logId:r[0],sessionId:r[0],date:r[1],client:r[2],bodyPart:r[3],workout:r[4],setNum:r[5],reps:r[6],weight:r[7],loggedAt:r[8]||'',trainerEmail:''};
  }).filter(l=>!email||(l.trainerEmail===email||l.trainerEmail===''));
}
async function loadSessions() {
  const rows=await getVals(`${SH.S}!A2:E`);
  const email=activeEmail();
  S.sessions=rows.filter(r=>r[0]).map(r=>({
    sessionId:r[0],date:r[1]||'',client:r[2]||'',notes:r[3]||'',trainerEmail:r[4]||''
  })).filter(s=>!email||(s.trainerEmail===email||s.trainerEmail===''));
}

// ── ADMIN BANNER ──
function setupAdminBanner() {
  const banner=document.getElementById('admin-banner');
  if (S.userRole!=='admin') { banner.classList.add('hidden'); return; }
  banner.classList.remove('hidden');
  const sel=document.getElementById('view-as-sel');
  const trainers=[...new Set(S.allUsers.map(u=>u.email))];
  sel.innerHTML='<option value="all">All Trainers</option>'+
    trainers.map(e=>{
      const u=S.allUsers.find(x=>x.email===e);
      const label=(u&&u.name)?u.name:e;
      return '<option value="'+esc(e)+'"'+(e===S.user.email?' selected':'')+'>'+escHtml(label)+'</option>';
    }).join('');
  sel.value=S.viewAsEmail||S.user.email;
  if (!S.viewAsEmail) S.viewAsEmail=S.user.email;
}

async function onViewAsChange(val) {
  S.viewAsEmail=val==='all'?null:val;
  showLoad(true);
  await loadAll();
  showLoad(false);
  renderClientsList();
  if (S.currentClient) renderClientDetail(S.currentClient);
}

// ── TOP AVATAR ──
function renderTopAvatar() {
  const wrap=document.getElementById('nav-avatar-wrap');
  if (S.user.picture) {
    wrap.innerHTML='<img class="user-avatar" src="'+S.user.picture+'" alt="avatar">';
  } else {
    wrap.innerHTML='<div class="user-avatar-placeholder">'+(S.user.given_name||S.user.email||'?').charAt(0).toUpperCase()+'</div>';
  }
}
function toggleProfileMenu() {
  const m=document.getElementById('profile-menu'), o=document.getElementById('pm-overlay');
  if (m.classList.contains('hidden')) {
    // Populate
    const pm=document.getElementById('pm-avatar-wrap');
    if (S.user.picture) pm.innerHTML='<img class="pm-avatar" src="'+S.user.picture+'">';
    else pm.innerHTML='<div class="pm-avatar-ph">'+(S.user.given_name||'?').charAt(0).toUpperCase()+'</div>';
    document.getElementById('pm-name').textContent=S.user.name||S.user.given_name||'';
    document.getElementById('pm-email').textContent=S.user.email||'';
    const rb=document.getElementById('pm-role-badge');
    rb.textContent=S.userRole==='admin'?'Admin':'Trainer';
    rb.className='pm-role '+(S.userRole==='admin'?'admin':'user');
    m.classList.remove('hidden'); o.classList.remove('hidden');
  } else {
    closeProfileMenu();
  }
}
function closeProfileMenu() {
  document.getElementById('profile-menu').classList.add('hidden');
  document.getElementById('pm-overlay').classList.add('hidden');
}

// ── CLIENTS ──
async function addClient() {
  const name=document.getElementById('nc-name').value.trim();
  const email=document.getElementById('nc-email').value.trim().toLowerCase();
  const phone=document.getElementById('nc-phone').value.trim();
  if (!name) { toast('Enter a name','error'); return; }
  if (!email||!email.includes('@')) { toast('Enter a valid email','error'); return; }
  if (S.clients.find(c=>c.name.toLowerCase()===name.toLowerCase())) { toast('Client name already exists','error'); return; }
  // Check duplicate email across ALL clients (not just filtered)
  const allRows=await getVals(`${SH.C}!A2:E`);
  const dupEmail=allRows.find(r=>r[4]&&r[4].toLowerCase()===email&&r[2]!=='false');
  if (dupEmail) { toast('A client with this email already exists','error'); return; }
  const trainerEmail=S.viewAsEmail&&S.viewAsEmail!=='all'?S.viewAsEmail:S.user.email;
  await appendVals(`${SH.C}!A:E`,[[name,phone,'true',trainerEmail,email]]);
  await loadClients();
  document.getElementById('nc-name').value='';
  document.getElementById('nc-email').value='';
  document.getElementById('nc-phone').value='';
  renderClientsList(); toast(name+' added','success');
}
async function removeClient(name) {
  if (!confirm('Remove "'+name+'"? History is retained.')) return;
  const rows=await getVals(`${SH.C}!A:D`), idx=rows.findIndex(r=>r[0]===name);
  if (idx<0) return;
  await updateVals(`${SH.C}!C${idx+1}`,[['false']]);
  await loadClients(); renderClientsList(); toast(name+' removed','success');
}

// ── SAVE SESSION ──
async function saveSession() {
  const date=document.getElementById('sess-date').value;
  const client=document.getElementById('sess-client').value;
  const notes=document.getElementById('sess-notes').value.trim();
  if (!date) { toast('Select a date','error'); return; }
  if (!client) { toast('Select a client','error'); return; }
  if (!S.sess.workouts.length) { toast('Add at least one workout','error'); return; }
  for (const wo of S.sess.workouts) {
    if (!wo.bodyPart||!wo.workout) { toast('Select body part and workout for all entries','error'); return; }
  }
  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='Saving...';
  const trainerEmail=S.viewAsEmail&&S.viewAsEmail!=='all'?S.viewAsEmail:S.user.email;
  try {
    const ts=new Date().toISOString();
    const isEdit=!!S.editingSessionId;
    const sid=isEdit?S.editingSessionId:'S'+Date.now();
    if (isEdit) {
      const allLR=await getAllVals(SH.L);
      const toClear=[];
      allLR.forEach((row,i)=>{if(i>0&&row[1]===sid)toClear.push(i+1);});
      if (toClear.length) {
        await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:SID,resource:{valueInputOption:'USER_ENTERED',
          data:toClear.map(rn=>({range:`${SH.L}!A${rn}:K${rn}`,values:[['','','','','','','','','','','']]})) }});
      }
      const allSR=await getAllVals(SH.S);
      const si=allSR.findIndex((row,i)=>i>0&&row[0]===sid);
      if(si>0) await updateVals(`${SH.S}!A${si+1}:E${si+1}`,[[sid,date,client,notes,trainerEmail]]);
    } else {
      await appendVals(`${SH.S}!A:E`,[[sid,date,client,notes,trainerEmail]]);
    }
    const logRows=[];let ri=0;
    S.sess.workouts.forEach(wo=>wo.sets.forEach((set,si)=>{
      logRows.push([`${sid}-${ri++}`,sid,date,client,wo.bodyPart,wo.workout,si+1,set.reps||'',set.weight||'',ts,trainerEmail]);
    }));
    await appendVals(`${SH.L}!A:K`,logRows);
    await Promise.all([loadLogs(),loadSessions()]);
    toast(isEdit?'Session updated ✓':'Session saved ✓','success');
    S.editingSessionId=null; resetSess();
    if (S.currentClient) { navigate('client-detail'); renderClientDetail(S.currentClient); }
    else navigate('clients');
  } catch(e) { console.error(e); toast('Save failed','error'); }
  finally { btn.disabled=false; btn.textContent='Save Session'; }
}

function resetSess() {
  S.sess={date:today(),client:S.currentClient||'',notes:'',workouts:[]};
  S.editingSessionId=null;
  document.getElementById('sess-date').value=today();
  document.getElementById('sess-client').value=S.currentClient||'';
  document.getElementById('sess-notes').value='';
  document.getElementById('log-title').textContent='Log Session';
  renderWoCards();
}

function editSession(sessionId) {
  const sess=S.sessions.find(s=>s.sessionId===sessionId);
  if (!sess) return;
  const sLogs=S.logs.filter(l=>l.sessionId===sessionId);
  const woMap={};
  sLogs.forEach(l=>{
    const key=l.bodyPart+'||'+l.workout;
    if(!woMap[key])woMap[key]={bodyPart:l.bodyPart,workout:l.workout,sets:[]};
    woMap[key].sets[+l.setNum-1]={reps:l.reps,weight:l.weight};
  });
  const workouts=Object.values(woMap).map(wo=>({...wo,sets:wo.sets.filter(Boolean)}));
  S.sess={date:sess.date,client:sess.client,notes:sess.notes,workouts};
  S.editingSessionId=sessionId;
  populateSel();
  document.getElementById('sess-date').value=sess.date;
  document.getElementById('sess-client').value=sess.client;
  document.getElementById('sess-notes').value=sess.notes;
  document.getElementById('log-title').textContent='Edit Session';
  document.getElementById('log-back-btn').onclick=()=>{ S.editingSessionId=null; navigate('client-detail'); renderClientDetail(S.currentClient); };
  renderWoCards();
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-view=log]').classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-log').classList.add('active');
}

async function deleteSession(sessionId) {
  if (!confirm('Delete this session? Cannot be undone.')) return;
  showLoad(true);
  try {
    const allSR=await getAllVals(SH.S);
    const si=allSR.findIndex((row,i)=>i>0&&row[0]===sessionId);
    if(si>0) await updateVals(`${SH.S}!A${si+1}:E${si+1}`,[['','','','','']]);
    const allLR=await getAllVals(SH.L);
    const toClear=[];
    allLR.forEach((row,i)=>{if(i>0&&row[1]===sessionId)toClear.push(i+1);});
    if(toClear.length) {
      await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:SID,resource:{valueInputOption:'USER_ENTERED',
        data:toClear.map(rn=>({range:`${SH.L}!A${rn}:K${rn}`,values:[['','','','','','','','','','','']]})) }});
    }
    await Promise.all([loadLogs(),loadSessions()]);
    renderClientDetail(S.currentClient);
    toast('Session deleted','success');
  } catch(e){ console.error(e); toast('Delete failed','error'); }
  finally { showLoad(false); }
}

// ── LOG STATE ──
function addWoCard() { S.sess.workouts.push({bodyPart:'',workout:'',sets:[{reps:'',weight:''}]}); renderWoCards(); }
function removeWoCard(i) { S.sess.workouts.splice(i,1); renderWoCards(); }
function setWoBp(i,val) { S.sess.workouts[i].bodyPart=val; S.sess.workouts[i].workout=''; renderWoCards(); }
function setWoName(i,val) { S.sess.workouts[i].workout=val; }
function addSet(i) { S.sess.workouts[i].sets.push({reps:'',weight:''}); renderWoCards(); }
function removeSet(i,si) { if(S.sess.workouts[i].sets.length<=1)return; S.sess.workouts[i].sets.splice(si,1); renderWoCards(); }
function updSet(i,si,f,v) { S.sess.workouts[i].sets[si][f]=v; }

// ── REPO ──
async function addToRepo(bp) {
  const bpId=bp.replace(/\s+/g,'_'),inp=document.getElementById('ri-'+bpId),name=inp.value.trim();
  if(!name)return;
  if((S.repo[bp]||[]).map(w=>w.toLowerCase()).includes(name.toLowerCase())){toast('Already exists','error');return;}
  await appendVals(`${SH.R}!A:B`,[[bp,name]]);
  await loadRepo(); inp.value=''; renderWorkoutsRepo(); toast('"'+name+'" added','success');
}
async function removeFromRepo(bp,name) {
  if(!confirm('Remove "'+name+'" from '+bp+'?'))return;
  const rows=await getVals(`${SH.R}!A:B`),idx=rows.findIndex(r=>r[0]===bp&&r[1]===name);
  if(idx<0)return;
  await updateVals(`${SH.R}!A${idx+1}:B${idx+1}`,[['','']]);
  await loadRepo(); renderWorkoutsRepo(); toast('"'+name+'" removed','success');
}

// ── ADMIN: TOGGLE USER ROLE ──
async function toggleRole(email) {
  if (S.userRole!=='admin') return;
  if (email===S.user.email) { toast("Can't change your own role",'error'); return; }
  const rows=await getVals(`${SH.U}!A2:E`);
  const idx=rows.findIndex(r=>r[0]===email);
  if(idx<0)return;
  const cur=rows[idx][3]||'user';
  const next=cur==='admin'?'user':'admin';
  await updateVals(`${SH.U}!D${idx+2}`,[[next]]);
  const ur=S.allUsers.find(u=>u.email===email);
  if(ur)ur.role=next;
  renderProfile();
  toast(email+' is now '+next,'success');
}

// ── RENDER ──
function renderClientsList() {
  const el=document.getElementById('clients-list'); populateSel();
  if (!S.clients.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">&#128101;</div><div class="empty-txt">No clients yet.</div></div>'; return; }
  el.innerHTML=S.clients.map(c=>{
    const cSess=S.sessions.filter(s=>s.client===c.name&&s.sessionId).sort((a,b)=>b.date.localeCompare(a.date));
    const last=cSess[0];
    const canEdit=S.userRole==='admin'||(c.trainerEmail===S.user.email);
    return '<div class="client-card" onclick="openClientDetail(\''+esc(c.name)+'\')">'+
      '<div class="cc-avatar">'+c.name.charAt(0).toUpperCase()+'</div>'+
      '<div class="cc-info">'+
        '<div class="cc-name">'+escHtml(c.name)+'</div>'+
        '<div class="cc-meta">'+escHtml(c.clientEmail||c.phone||'')+'</div>'+
        '<div class="cc-stats">'+
          '<div class="cc-stat"><strong>'+cSess.length+'</strong> sessions</div>'+
          '<div class="cc-stat">Last: <strong>'+(last?fmtDate(last.date):'&#8212;')+'</strong></div>'+
        '</div>'+
      '</div>'+
      (canEdit?'<button class="btn-icon-sm" style="font-size:16px;flex-shrink:0" title="Edit client" onclick="event.stopPropagation();openEditClient(\''+esc(c.name)+'\')" >&#128393;</button>':'')+
      '<div class="cc-arrow">&#8250;</div>'+
    '</div>';
  }).join('');
}

function openClientDetail(name) {
  S.currentClient=name;
  document.getElementById('detail-name').textContent=name;
  renderClientDetail(name);
  navigate('client-detail');
}

function renderClientDetail(name) {
  const el=document.getElementById('sess-list-el');
  const cSess=S.sessions.filter(s=>s.client===name&&s.sessionId).sort((a,b)=>b.date.localeCompare(a.date));
  if (!cSess.length) { el.innerHTML='<div class="empty-state"><div class="empty-icon">&#127947;</div><div class="empty-txt">No sessions yet.<br>Tap "+ Log" to add one.</div></div>'; return; }
  el.innerHTML=cSess.map((sess,idx)=>{
    const sLogs=S.logs.filter(l=>l.sessionId===sess.sessionId||(l.sessionId===l.logId&&l.date===sess.date&&l.client===name));
    const byBp={};
    sLogs.forEach(l=>{
      if(!byBp[l.bodyPart])byBp[l.bodyPart]={};
      if(!byBp[l.bodyPart][l.workout])byBp[l.bodyPart][l.workout]=[];
      byBp[l.bodyPart][l.workout].push({setNum:+l.setNum,reps:l.reps,weight:l.weight});
    });
    const bpList=Object.keys(byBp);
    const hasNotes=!!sess.notes;
    const summaryHtml=bpList.map(bp=>{
      const sc=Object.values(byBp[bp]).reduce((a,sets)=>a+sets.length,0);
      return '<span class="bp-sum-tag">'+escHtml(bp)+' <em>'+sc+'</em></span>';
    }).join('');
    const woRows=[];
    bpList.forEach(bp=>{
      Object.entries(byBp[bp]).forEach(([wo,sets],wi)=>{
        const chips=sets.sort((a,b)=>a.setNum-b.setNum)
          .map(s=>'<span class="set-chip">'+(s.reps||'\u2014')+'\xd7'+(s.weight||'\u2014')+'kg</span>').join('');
        woRows.push({bp:wi===0?bp:'',wo,chips});
      });
    });
    const bodyHtml=
      (hasNotes?'<div class="sess-notes-row">&#128221; <span>'+escHtml(sess.notes)+'</span></div>':'')+
      woRows.map(r=>'<div class="wo-row"><div class="wo-left">'+escHtml(r.bp)+'</div><div class="wo-right"><div class="wo-name">'+escHtml(r.wo)+'</div><div class="sets-chips">'+r.chips+'</div></div></div>').join('');
    const sid=esc(sess.sessionId);
    return '<div class="sess-item" id="si-'+idx+'">'+
      '<div class="sess-item-header" onclick="toggleSess('+idx+')">'+
        '<div class="sess-date">'+fmtDate(sess.date)+'</div>'+
        '<div class="sess-summary">'+summaryHtml+'</div>'+
        '<div class="sess-hdr-actions">'+
          (hasNotes?'<span class="note-dot"></span>':'')+
          '<button class="btn-icon-sm" title="Edit" onclick="event.stopPropagation();editSession(&quot;'+sid+'&quot;)" style="transform:scaleX(-1);display:inline-block">&#9998;</button>'+
          '<button class="btn-icon-sm btn-icon-del" title="Delete" onclick="event.stopPropagation();deleteSession(&quot;'+sid+'&quot;)">&#128465;</button>'+
          '<span class="sess-chevron">&#9662;</span>'+
        '</div>'+
      '</div>'+
      '<div class="sess-body">'+bodyHtml+'</div>'+
    '</div>';
  }).join('');
}

function toggleSess(idx) { document.getElementById('si-'+idx).classList.toggle('open'); }

function renderWoCards() {
  const c=document.getElementById('blocks-container'); c.innerHTML='';
  S.sess.workouts.forEach((wo,i)=>{
    const avail=S.repo[wo.bodyPart]||[];
    const d=document.createElement('div'); d.className='wo-card'; d.style.marginBottom='8px';
    d.innerHTML=
      '<div class="wo-card-top">'+
        '<select onchange="setWoBp('+i+',this.value)" style="flex:1.1">'+
          '<option value="">Body part...</option>'+
          BODY_PARTS.map(p=>'<option value="'+p+'"'+(wo.bodyPart===p?' selected':'')+'>'+p+'</option>').join('')+
        '</select>'+
        '<select onchange="setWoName('+i+',this.value)" style="flex:1.4"'+(wo.bodyPart?'':' disabled')+'>'+
          '<option value="">Workout...</option>'+
          avail.map(w=>'<option value="'+esc(w)+'"'+(wo.workout===w?' selected':'')+'>'+escHtml(w)+'</option>').join('')+
        '</select>'+
        '<button class="btn-rm" onclick="removeWoCard('+i+')">&#10005;</button>'+
      '</div>'+
      '<div class="sets-area">'+
        wo.sets.map((set,si)=>
          '<div class="set-row">'+
            '<div class="set-lbl">'+(si+1)+'</div>'+
            '<input class="set-inp" type="number" min="0" step="1" value="'+escHtml(set.reps)+'" placeholder="Reps" oninput="updSet('+i+','+si+',\'reps\',this.value)">'+
            '<span class="set-sep">&times;</span>'+
            '<input class="set-inp" type="number" min="0" step="0.5" value="'+escHtml(set.weight)+'" placeholder="kg" oninput="updSet('+i+','+si+',\'weight\',this.value)">'+
            '<button class="btn-rm" onclick="removeSet('+i+','+si+')"'+(wo.sets.length<=1?' disabled':'')+'>&#10005;</button>'+
          '</div>'
        ).join('')+
      '</div>'+
      '<button class="add-set-link" onclick="addSet('+i+')">+ Add Set</button>';
    c.appendChild(d);
  });
}

function renderWorkoutsRepo() {
  const el=document.getElementById('repo-grid');
  const all=[...new Set([...BODY_PARTS,...Object.keys(S.repo)])];
  el.innerHTML=all.map(bp=>{
    const wos=S.repo[bp]||[],bpId=bp.replace(/\s+/g,'_');
    return '<div class="repo-group">'+
      '<div class="repo-group-head"><span class="repo-group-name">'+bp+'</span><span class="repo-group-count">'+wos.length+' exercises</span></div>'+
      '<div class="repo-chips">'+
        wos.map(w=>'<span class="wo-chip">'+escHtml(w)+'<button onclick="removeFromRepo(\''+esc(bp)+'\',\''+esc(w)+'\')">&#215;</button></span>').join('')+
        (!wos.length?'<span style="color:var(--text3);font-size:12px">None yet</span>':'')+
      '</div>'+
      '<div class="repo-add-row">'+

        '<button class="btn-add-sm" onclick="addToRepo(\''+esc(bp)+'\')">Add</button>'+
      '</div>'+

}

  const avatarHtml=S.user.picture
    ?'<img class="profile-pic" src="'+S.user.picture+'" alt="avatar">'
    :'<div class="profile-pic-ph">'+(S.user.given_name||'?').charAt(0).toUpperCase()+'</div>';

        '<div class="profile-email">'+escHtml(S.user.email||'')+'</div>'+
        '<div class="pm-role '+(S.userRole==='admin'?'admin':'user')+'" style="margin-top:4px">'+(S.userRole==='admin'?'Admin':'Trainer')+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="font-size:12px;color:var(--text3)">Profile photo and name are pulled from your Google account. To update them, change your Google profile.</div>';

      :'<div class="user-row-avatar-ph">'+(u.name||u.email||'?').charAt(0).toUpperCase()+'</div>';
    return '<tr>'+

      '<td style="font-size:11px;color:var(--text3)">'+escHtml(u.email)+'</td>'+
      '<td><button class="role-badge '+u.role+'" onclick="toggleRole(\''+esc(u.email)+'\')">'+escHtml(u.role)+'</button></td>'+
    '</tr>';
  }).join('');
}

// ── EDIT CLIENT ──
let _editClientOrig = null;
function openEditClient(name) {
  const c=S.clients.find(x=>x.name===name);
  if (!c) return;
  _editClientOrig=name;
  document.getElementById('ec-name').value=c.name;
  document.getElementById('ec-email').value=c.clientEmail||'';
  document.getElementById('ec-phone').value=c.phone||'';
  document.getElementById('edit-client-modal').classList.remove('hidden');
}
function closeEditClient() {
  document.getElementById('edit-client-modal').classList.add('hidden');
  _editClientOrig=null;
}
async function saveClientEdit() {
  const newName=document.getElementById('ec-name').value.trim();
  const newEmail=document.getElementById('ec-email').value.trim().toLowerCase();
  const newPhone=document.getElementById('ec-phone').value.trim();
  if (!newName) { toast('Name is required','error'); return; }
  if (!newEmail||!newEmail.includes('@')) { toast('Valid email required','error'); return; }
  // Check duplicate email (excluding self)
  const allRows=await getVals(`${SH.C}!A2:E`);
  const dupEmail=allRows.find(r=>r[4]&&r[4].toLowerCase()===newEmail&&r[0]!==_editClientOrig&&r[2]!=='false');
  if (dupEmail) { toast('Email already used by another client','error'); return; }
  const idx=allRows.findIndex(r=>r[0]===_editClientOrig);
  if (idx<0) { toast('Client not found','error'); return; }
  const existing=allRows[idx];
  await updateVals(`${SH.C}!A${idx+2}:E${idx+2}`,[[newName,newPhone,existing[2]||'true',existing[3]||'',newEmail]]);
  await loadClients();
  closeEditClient();
  renderClientsList();
  toast('Client updated','success');
}

function populateSel() {
  const opts='<option value="">Select client...</option>'+S.clients.map(c=>'<option value="'+esc(c.name)+'">'+escHtml(c.name)+'</option>').join('');
  document.getElementById('sess-client').innerHTML=opts;
}

function openLogFor() {
  document.getElementById('log-back-btn').onclick=()=>{ S.editingSessionId=null; navigate('client-detail'); renderClientDetail(S.currentClient); };
  populateSel();
  document.getElementById('sess-client').value=S.currentClient||'';
  document.getElementById('log-title').textContent='Log Session';
  resetSess();
  if(!S.sess.workouts.length)addWoCard();
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-view=log]').classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-log').classList.add('active');
}

// ── NAV ──
function navigate(view,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const m=document.querySelector('[data-view="'+view+'"]');if(m)m.classList.add('active');}
  if(view==='clients')renderClientsList();
  if(view==='log'){populateSel();document.getElementById('log-back-btn').onclick=()=>navigate('clients');if(!S.sess.workouts.length)addWoCard();renderWoCards();}
  if(view==='workouts')renderWorkoutsRepo();
  if(view==='profile')renderProfile();
}

// ── UTILS ──
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){
  if(!d)return '\u2014';
  try{return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'});}
  catch(_){return d;}
}
function showLoad(on){document.getElementById('loading').style.display=on?'flex':'none';}
function toast(msg,type='success'){
  const el=document.getElementById('toast'),t=document.createElement('div');
  t.className='t-item '+type;t.textContent=msg;el.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
