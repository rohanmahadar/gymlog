<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>GymLog</title>
  <!-- PWA -->
  <meta name="theme-color" content="#1a56db">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GymLog">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <!-- Apple touch icons -->
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <style>
    :root {
      --bg:#f2f2f2; --white:#fff; --border:#e0e0e0; --border2:#c8c8c8;
      --accent:#1a56db; --accentl:#e8effd;
      --text:#111; --text2:#555; --text3:#999;
      --red:#dc2626; --redl:#fef2f2; --green:#16a34a;
      --r:8px; --r2:5px; --shadow:0 1px 4px rgba(0,0,0,.08);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
    /* iOS standalone safe area */
    @supports(padding-top: env(safe-area-inset-top)) {
      .top-bar{padding-top:env(safe-area-inset-top)!important;height:calc(50px + env(safe-area-inset-top))!important;}
      #screen-app{padding-bottom:calc(60px + env(safe-area-inset-bottom))}
      .bottom-nav{padding-bottom:env(safe-area-inset-bottom)}
      #screen-setup{padding-top:env(safe-area-inset-top)}
    }
    button{cursor:pointer;font-family:Arial,Helvetica,sans-serif;border:none;outline:none;transition:all .15s}
    input,select,textarea{font-family:Arial,Helvetica,sans-serif;background:var(--white);color:var(--text);border:1px solid var(--border);border-radius:var(--r2);padding:8px 10px;font-size:14px;outline:none;transition:border-color .15s;width:100%}
    input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentl)}
    textarea{resize:vertical;min-height:54px}

    /* ── SIGN IN ── */
    #screen-setup{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
    .signin-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:44px 28px;width:100%;max-width:320px;box-shadow:var(--shadow);text-align:center}
    .signin-logo{font-size:28px;font-weight:700;margin-bottom:4px}
    .signin-logo span{color:var(--accent)}
    .signin-sub{color:var(--text3);font-size:13px;margin-bottom:36px}
    .btn-google{width:100%;padding:12px 16px;background:var(--white);color:var(--text);font-weight:700;font-size:14px;border-radius:var(--r2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:var(--shadow)}
    .btn-google:hover{border-color:var(--accent);background:var(--accentl)}
    .btn-google svg{flex-shrink:0}
    .signin-access{margin-top:18px;font-size:12px;color:var(--text3)}

    /* ── APP ── */
    #screen-app{display:none;min-height:100vh;padding-bottom:60px}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:100}
    .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:transparent;color:var(--text3);font-size:10px;font-weight:700;padding:6px 0;border-radius:0}
    .bn-item .bn-icon{font-size:19px;line-height:1}
    .bn-item.active{color:var(--accent)}
    .hidden-nav{display:none!important}

    .top-bar{position:sticky;top:0;background:var(--white);border-bottom:1px solid var(--border);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;z-index:90}
    .top-bar-title{font-size:16px;font-weight:700}
    .top-bar-back{display:flex;align-items:center;gap:4px;background:transparent;color:var(--accent);font-size:14px;font-weight:700;padding:4px 0}
    .top-bar-action{background:var(--accent);color:#fff;font-size:13px;font-weight:700;padding:7px 14px;border-radius:var(--r2)}
    .top-bar-action:hover{background:#1447c0}

    /* User avatar in top bar */
    .user-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--border);cursor:pointer}
    .user-avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--border)}

    /* Profile dropdown */
    .profile-menu{position:fixed;top:54px;right:14px;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:200;min-width:260px;max-width:300px;padding:14px}
    .pm-detail{display:flex;gap:6px;align-items:baseline;margin-top:4px}
    .pm-detail-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;min-width:46px;flex-shrink:0}
    .pm-detail-val{font-size:12px;color:var(--text2);word-break:break-all}
    .profile-menu.hidden{display:none}
    .pm-user{display:flex;align-items:center;gap:12px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .pm-avatar{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0}
    .pm-avatar-ph{width:40px;height:40px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .pm-name{font-size:15px;font-weight:700;line-height:1.3;margin-bottom:2px}
    .pm-email{font-size:11px;color:var(--text3)}
    .pm-role{display:inline-block;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;margin-top:2px}
    .pm-role.admin{background:#fef9c3;color:#a16207}
    .pm-role.user{background:var(--accentl);color:var(--accent)}
    .pm-btn{width:100%;text-align:left;background:transparent;color:var(--text2);font-size:14px;font-weight:600;padding:10px 0;border-radius:0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;line-height:1.3}
    .pm-btn:last-child{border-bottom:none;padding-bottom:0}
    .pm-btn:hover{color:var(--text);background:transparent}
    .pm-signout{color:var(--red)!important}
    .pm-overlay{position:fixed;inset:0;z-index:199}
    .pm-overlay.hidden{display:none}


    .view{display:none}
    .view.active{display:block}
    .view-pad{padding:14px}
    .pb{height:14px}
    .sec-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

    /* ── CLIENTS ── */
    .clients-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
    .client-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;transition:border-color .15s}
    .client-card:hover{border-color:var(--accent)}
    .cc-avatar{width:40px;height:40px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
    .cc-info{flex:1;min-width:0}
    .cc-name{font-size:15px;font-weight:700}
    .cc-meta{font-size:12px;color:var(--text3)}
    .cc-stats{display:flex;gap:14px;margin-top:4px}
    .cc-stat{font-size:11px;color:var(--text2)}
    .cc-stat strong{color:var(--text)}
    .cc-arrow{color:var(--text3);font-size:20px}
    .add-client-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;box-shadow:var(--shadow)}
    .form-group{margin-bottom:10px}
    .form-group:last-child{margin-bottom:0}
    .form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}

    /* Edit client modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:flex;align-items:flex-end;justify-content:center}
    .modal-overlay.hidden{display:none}
    .modal-sheet{background:var(--white);border-radius:16px 16px 0 0;padding:24px 20px 32px;width:100%;max-width:500px;box-shadow:0 -4px 24px rgba(0,0,0,.12)}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
    .modal-close{background:transparent;color:var(--text3);font-size:20px;padding:2px 6px;border-radius:var(--r2)}
    .modal-close:hover{color:var(--text)}

    /* ── CLIENT DETAIL ── */
    .session-list{padding:10px 14px;display:flex;flex-direction:column;gap:8px}
    .sess-item{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
    .sess-item-header{display:flex;align-items:center;gap:6px;padding:10px 12px;cursor:pointer;user-select:none}
    .sess-item-header:active{background:var(--bg)}
    .sess-date{font-size:13px;font-weight:700;white-space:nowrap;margin-right:2px}
    .sess-summary{display:flex;gap:4px;flex-wrap:wrap;flex:1;min-width:0}
    .bp-sum-tag{background:var(--accentl);color:var(--accent);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
    .bp-sum-tag em{font-style:normal;color:var(--text2);margin-left:2px}
    .sess-hdr-actions{display:flex;align-items:center;gap:2px;flex-shrink:0}
    .note-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:4px}
    .btn-icon-sm{background:transparent;color:var(--text3);font-size:15px;padding:3px 5px;line-height:1;border-radius:var(--r2)}
    .btn-icon-sm:hover{color:var(--accent);background:var(--accentl)}
    .btn-icon-del:hover{color:var(--red)!important;background:var(--redl)!important}
    .sess-chevron{color:var(--text3);font-size:11px;transition:transform .2s;margin-left:1px}
    .sess-item.open .sess-chevron{transform:rotate(180deg)}
    .sess-body{display:none;border-top:1px solid var(--border)}
    .sess-item.open .sess-body{display:block}
    .sess-notes-row{padding:7px 12px;background:#fffbeb;border-bottom:1px solid #fef3c7;font-size:12px;color:#92400e;display:flex;gap:5px}
    .sess-notes-row span{flex:1}
    .wo-row{display:flex;align-items:baseline;gap:0;padding:6px 12px;border-bottom:1px solid var(--border)}
    .wo-row:last-child{border-bottom:none}
    .wo-left{min-width:72px;max-width:72px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding-top:1px;flex-shrink:0}
    .wo-right{flex:1;min-width:0}
    .wo-name{font-size:13px;font-weight:700;margin-bottom:3px}
    .sets-chips{display:flex;flex-wrap:wrap;gap:3px}
    .set-chip{background:var(--bg);border:1px solid var(--border);font-size:11px;color:var(--text);padding:1px 7px;border-radius:20px;font-weight:600}

    /* ── LOG ── */
    .log-form{padding:12px;display:flex;flex-direction:column;gap:10px}
    .log-row{display:flex;gap:8px}
    .log-row .form-group{flex:1;margin-bottom:0}
    .wo-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
    .wo-card-top{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--bg);border-bottom:1px solid var(--border)}
    .wo-card-top select{flex:1;font-size:13px;padding:5px 7px}
    .btn-rm{background:transparent;color:var(--text3);font-size:16px;padding:2px 5px;line-height:1;flex-shrink:0}
    .btn-rm:hover{color:var(--red)}
    .btn-rm:disabled{opacity:.25;cursor:default}
    .sets-area{padding:8px 10px}
    .set-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .set-row:last-child{margin-bottom:0}
    .set-lbl{font-size:11px;font-weight:700;color:var(--text3);min-width:20px;text-align:center}
    .set-inp{flex:1;padding:6px 6px;font-size:14px;text-align:center}
    .set-sep{font-size:12px;color:var(--text3);flex-shrink:0}
    .add-set-link{display:block;text-align:center;padding:5px;color:var(--accent);font-size:12px;font-weight:700;border-top:1px dashed var(--border);background:transparent;width:100%}
    .add-set-link:hover{background:var(--accentl)}
    .add-wo-btn{width:100%;padding:11px;background:var(--white);border:2px dashed var(--border);border-radius:var(--r);color:var(--text2);font-size:13px;font-weight:700}
    .add-wo-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accentl)}
    .save-btn{width:100%;padding:13px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;border-radius:var(--r)}
    .save-btn:hover{background:#1447c0}
    .save-btn:disabled{opacity:.4;cursor:not-allowed}
    .btn-add-sm{background:var(--accent);color:#fff;font-size:12px;font-weight:700;padding:7px 12px;border-radius:var(--r2);white-space:nowrap}
    .btn-add-sm:hover{background:#1447c0}

    /* ── WORKOUTS ── */
    .repo-group{background:var(--white);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden}
    .repo-group-head{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:var(--bg);border-bottom:1px solid var(--border)}
    .repo-group-name{font-size:13px;font-weight:700}
    .repo-group-count{font-size:11px;color:var(--text3)}
    .repo-chips{padding:9px 11px;display:flex;flex-wrap:wrap;gap:5px}
    .wo-chip{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px}
    .wo-chip button{background:none;color:var(--text3);font-size:13px;padding:0;line-height:1}
    .wo-chip button:hover{color:var(--red)}
    .repo-add-row{padding:7px 11px;border-top:1px dashed var(--border);display:flex;gap:7px}
    .repo-add-row input{flex:1;padding:6px 9px;font-size:13px}

    /* ── PROFILE EDIT ── */
    .profile-section{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
    .profile-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .profile-pic{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border)}
    .profile-pic-ph{width:56px;height:56px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--border)}
    .profile-info{flex:1}
    .profile-name{font-size:16px;font-weight:700}
    .profile-email{font-size:12px;color:var(--text3)}

    /* Users table (admin) */
    .users-table{width:100%;border-collapse:collapse;font-size:13px}
    .users-table th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
    .users-table td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
    .users-table tr:last-child td{border-bottom:none}
    .user-row-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;vertical-align:middle}
    .user-row-avatar-ph{width:28px;height:28px;border-radius:50%;background:var(--accentl);color:var(--accent);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
    .role-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;cursor:pointer;border:none}
    .role-badge.admin{background:#fef9c3;color:#a16207}
    .role-badge.user{background:var(--accentl);color:var(--accent)}

    /* ── PROFILE SHEET ── */
    .profile-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:400;opacity:0;transition:opacity .25s}
    .profile-sheet-overlay.open{opacity:1}
    .profile-sheet{position:fixed;bottom:0;left:0;right:0;max-width:560px;margin:0 auto;background:var(--white);border-radius:20px 20px 0 0;z-index:401;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
    .profile-sheet.open{transform:translateY(0)}
    .ps-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
    .ps-hero{background:linear-gradient(135deg,#1a56db 0%,#3b82f6 100%);padding:28px 20px 20px;text-align:center;position:relative}
    .ps-avatar{width:76px;height:76px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.7);margin:0 auto 10px;display:block}
    .ps-avatar-ph{width:76px;height:76px;border-radius:50%;background:rgba(255,255,255,.25);color:#fff;font-size:30px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;border:3px solid rgba(255,255,255,.4)}
    .ps-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
    .ps-role-pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;color:#fff;background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4)}
    .ps-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .ps-body{padding:16px 18px}
    .ps-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .ps-row:last-child{border-bottom:none}
    .ps-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;min-width:80px;flex-shrink:0}
    .ps-val{flex:1;font-size:14px;color:var(--text);font-weight:500}
    .ps-edit-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
    .ps-edit-row:last-child{border-bottom:none}
    .ps-edit-row .ps-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;min-width:80px;flex-shrink:0}
    .ps-edit-row input,.ps-edit-row select{flex:1;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--r2);background:var(--white)}
    .ps-edit-row input:disabled{background:var(--bg);color:var(--text3)}
    .ps-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
    .ps-edit-btn{flex:1;padding:11px;background:var(--accent);color:#fff;font-weight:700;font-size:14px;border-radius:var(--r2);border:none;cursor:pointer}
    .ps-save-btn{flex:1;padding:11px;background:#16a34a;color:#fff;font-weight:700;font-size:14px;border-radius:var(--r2);border:none;cursor:pointer}
    .ps-cancel-btn{padding:11px 16px;background:var(--bg);color:var(--text2);font-weight:700;font-size:14px;border-radius:var(--r2);border:1px solid var(--border);cursor:pointer}

    /* Loading / Toast */
    .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;z-index:500}
    .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .5s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #toast{position:fixed;bottom:66px;right:14px;z-index:999;display:flex;flex-direction:column;gap:5px}
    .t-item{background:var(--text);color:#fff;border-radius:var(--r2);padding:9px 14px;font-size:13px;font-weight:600;min-width:160px;animation:slideUp .18s ease}
    .t-item.error{background:var(--red)}
    .t-item.success{background:var(--green)}
    @keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
    .fab{position:fixed;bottom:72px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(26,86,219,.4);z-index:95;transition:transform .15s,opacity .15s}
    .fab:hover{transform:scale(1.08)}
    .fab.hidden{display:none}
    .empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
    .empty-icon{font-size:32px;margin-bottom:8px}
    .empty-txt{font-size:13px}
    .access-denied{text-align:center;padding:60px 20px}
    .access-denied h2{font-size:18px;margin-bottom:8px}
    .access-denied p{font-size:13px;color:var(--text3)}
  </style>
</head>
<body>

<!-- SIGN IN -->
<div id="screen-setup">
  <div class="signin-card">
    <div class="signin-logo">Gym<span>Log</span></div>

<script>
// ── CONFIG ──
const CID = '590030292842-dvjun5fmag580q482pfj5v513b1o86no.apps.googleusercontent.com';
const SID = '1APQUzDA1D8cbKz9PJTv4CL-_4_PUQTdgdmcsXTFqDNk';
const DISC   = 'https://sheets.googleapis.com/$discovery/rest?version=v4';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile';
const SH = {U:'Users',C:'Clients',R:'WorkoutRepo',L:'WorkoutLogs',S:'Sessions'};
const BODY_PARTS = ['Chest','Back','Shoulders','Biceps','Triceps','Legs','Glutes','Core','Cardio','Full Body'];
const DEFAULT_REPO = {
  'Chest':    ['Bench Press','Incline Bench Press','Decline Bench Press','Dumbbell Flyes','Cable Crossovers','Push-ups','Chest Dips','Pec Deck'],
  'Back':     ['Deadlift','Pull-ups','Bent-over Row','Lat Pulldown','Seated Cable Row','T-Bar Row','Single-arm Dumbbell Row','Face Pull'],
  'Shoulders':['Barbell Overhead Press','Dumbbell Shoulder Press','Lateral Raises','Front Raises','Rear Delt Flyes','Arnold Press','Upright Row','Cable Lateral Raises'],
  'Biceps':   ['Barbell Curl','Dumbbell Curl','Hammer Curl','Preacher Curl','Concentration Curl','Cable Curl','Incline Dumbbell Curl','Reverse Curl'],
  'Triceps':  ['Tricep Dips','Skull Crushers','Tricep Pushdown','Overhead Tricep Extension','Close Grip Bench Press','Kickbacks','Diamond Push-ups'],
  'Legs':     ['Barbell Squat','Leg Press','Lunges','Leg Extension','Leg Curl','Romanian Deadlift','Calf Raises','Hack Squat','Bulgarian Split Squat','Step-ups'],
  'Glutes':   ['Hip Thrust','Glute Bridge','Cable Kickback','Sumo Squat','Resistance Band Walks'],
  'Core':     ['Plank','Crunches','Russian Twists','Leg Raises','Ab Rollout','Cable Crunch','Bicycle Crunches','Hanging Knee Raises'],
  'Cardio':   ['Treadmill Run','Stationary Bike','Rowing Machine','Jump Rope','Stair Climber','Elliptical','HIIT Sprints'],
  'Full Body':['Clean and Press','Burpees','Kettlebell Swings','Thrusters','Turkish Get-up','Battle Ropes']
};

// ── STATE ──
const S = {
  user:null,           // {email, name, picture, given_name}
  userRole:'user',     // 'user' | 'admin'
  viewAsEmail:null,    // null = own data; for admin: specific email or 'all'
  allUsers:[],         // [{name,phone,active,trainerEmail,email,role,pictureUrl,registeredAt}] — from Clients sheet
  clients:[], repo:{}, logs:[], sessions:[],
  sess:{date:'',client:'',notes:'',workouts:[]},
  myPhone:'',
  currentClient:null, editingSessionId:null,
  tc:null, gapiOk:false, gisOk:false
};

// ── GAPI ──
window.gapiLoaded = () => {
  gapi.load('client', async () => {
    try {
      // Init without discoveryDocs — load sheets API after auth instead
      await gapi.client.init({});
      S.gapiOk=true;
    } catch(e) {
      console.error('gapi init error:',e);
      S.gapiOk=true; // proceed anyway, sheets API loaded on demand
    }
    onReady();
  });
};
window.gisLoaded = () => { S.gisOk=true; onReady(); };
function onReady() {
  if (!S.gapiOk||!S.gisOk) return;
  document.getElementById('sess-date').value = today();
  if (localStorage.getItem('gl_authed')==='1') {
    silentSignIn();
  }
}

function silentSignIn() {
  // Show a subtle spinner but don't cover the sign-in button
  const loadingEl=document.getElementById('loading');
  loadingEl.style.display='flex';
  loadingEl.style.background='rgba(255,255,255,0.4)'; // semi-transparent so button stays visible
  const bailout = setTimeout(() => {
    loadingEl.style.display='none';
    loadingEl.style.background='';
    localStorage.removeItem('gl_authed');
  }, 6000);
  try {
    S.tc = google.accounts.oauth2.initTokenClient({
      client_id: CID, scope: SCOPES,
      prompt: '',
      callback: async (resp) => {
        clearTimeout(bailout);
        if (resp.error || !resp.access_token) {
          const le=document.getElementById('loading');
          le.style.display='none'; le.style.background='';
          localStorage.removeItem('gl_authed');
          return;
        }
        gapi.client.setToken(resp);
        const expiresIn = (resp.expires_in || 3600) - 120;
        setTimeout(silentSignIn, expiresIn * 1000);
        await postAuth();
      }
    });
    S.tc.requestAccessToken({prompt: ''});
  } catch(e) {
    clearTimeout(bailout);
    const le=document.getElementById('loading');
    le.style.display='none'; le.style.background='';
    localStorage.removeItem('gl_authed');
  }
}

// ── AUTH ──
function handleSignIn() {
  if (typeof google === 'undefined' || !google.accounts) {
    toast('Google not loaded yet — please wait and retry','error'); return;
  }
  if (typeof gapi === 'undefined' || !gapi.client) {
    toast('GAPI not loaded yet — please wait and retry','error'); return;
  }
  try {
    S.tc = google.accounts.oauth2.initTokenClient({
      client_id:CID, scope:SCOPES,
      error_callback: (err) => { toast('Sign-in error: '+(err.type||err),'error'); },
      callback: async (resp) => {
        if (resp.error) { toast('Auth error: '+resp.error,'error'); return; }
        gapi.client.setToken(resp);
        const expiresIn = (resp.expires_in || 3600) - 120;
        setTimeout(silentSignIn, expiresIn * 1000);
        await postAuth();
      }
    });
    S.tc.requestAccessToken({prompt:'consent'});
  } catch(e) {
    toast('Sign-in failed: '+e.message,'error');
    console.error('handleSignIn error:',e);
  }
}

async function postAuth() {
  showLoad(true);
  try {
    // Ensure sheets API is loaded
    if (!gapi.client.sheets) {
      await gapi.client.load('https://sheets.googleapis.com/$discovery/rest?version=v4');
    }
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
      {headers:{Authorization:'Bearer '+gapi.client.getToken().access_token}});
    S.user = await r.json();
    await initSheets();
    // Register / load user
    await registerUser();
    // Block pending/non-approved users
    if (S.userRole === 'pending' || S.userRole === 'removed' || S.userRole === 'deleted') {
      showLoad(false);
      document.getElementById('screen-setup').style.display='none';
      document.getElementById('screen-app').style.display='none';
      document.body.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Arial;padding:24px;background:#f2f2f2"><div style="background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:40px 28px;max-width:320px;width:100%;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)"><div style="font-size:26px;font-weight:700;margin-bottom:6px">Gym<span style=color:#1a56db>Log</span></div><div style="font-size:32px;margin:16px 0">&#9203;</div><h2 style="font-size:17px;margin-bottom:8px">Access Pending</h2><p style="font-size:13px;color:#999;margin-bottom:20px">Your account is awaiting admin approval.<br>You will be able to sign in once approved.</p><button onclick="handleSignOutRaw()" style="background:#1a56db;color:#fff;border:none;padding:10px 20px;border-radius:5px;font-weight:700;font-size:14px;cursor:pointer">Sign Out</button></div></div>';
      return;
    }
    await loadAll();
    document.getElementById('screen-setup').style.display='none';
    document.getElementById('screen-app').style.display='block';
    localStorage.setItem('gl_authed','1');
    renderTopAvatar();
    const _woNav=document.getElementById('nav-workouts');
    if(S.userRole==='admin'||S.userRole==='trainer') _woNav.classList.remove('hidden-nav');
    // Show FAB for admin/trainer on home screen
    const _fab=document.getElementById('fab-add-client');
    if(_fab&&(S.userRole==='admin'||S.userRole==='trainer')) _fab.classList.remove('hidden');
    // Hide add-client form for client role
    if(S.userRole==='client'){
      const acl=document.getElementById('add-client-label');
      const acb=document.getElementById('add-client-box');
      if(acl)acl.style.display='none';
      if(acb)acb.style.display='none';
      // Client goes directly to log screen
      navigate('log',document.querySelector('[data-view=log]'));
    } else {
      renderClientsList();
    }
  } catch(e) {
    console.error(e);
    localStorage.removeItem('gl_authed');
    toast('Could not connect. Check console.','error');
  }
  finally { showLoad(false); }
}

function handleSignOutRaw() {
  localStorage.removeItem('gl_authed');
  try { google.accounts.oauth2.revoke(gapi.client.getToken().access_token,()=>{}); } catch(_){}
  gapi.client.setToken(null);
  window.location.reload();
}
function handleSignOut() {
  localStorage.removeItem('gl_authed');
  try { google.accounts.oauth2.revoke(gapi.client.getToken().access_token,()=>{}); } catch(_){}
  gapi.client.setToken(null);
  closeProfileMenu();
  document.getElementById('screen-app').style.display='none';
  document.getElementById('screen-setup').style.display='flex';
}

// ── SHEETS INIT ──
async function initSheets() {
  const meta = await gapi.client.sheets.spreadsheets.get({spreadsheetId:SID});
  const existing = meta.result.sheets.map(s=>s.properties.title);
  const needed = [SH.U,SH.C,SH.R,SH.L,SH.S].filter(n=>!existing.includes(n));
  if (needed.length) {
    await gapi.client.sheets.spreadsheets.batchUpdate({spreadsheetId:SID,
      resource:{requests:needed.map(title=>({addSheet:{properties:{title}}}))}});
  }
  const headers=[];
  // Users: Email | RegisteredAt (access control only)
  if (!existing.includes(SH.U)) headers.push({range:`${SH.U}!A1:B1`,values:[['Email','RegisteredAt']]});
  // Clients: Name|Phone|Active|TrainerEmail|Email|Role|PictureUrl|RegisteredAt
  if (!existing.includes(SH.C)) headers.push({range:`${SH.C}!A1:H1`,values:[['Name','Phone','Active','TrainerEmail','Email','Role','PictureUrl','RegisteredAt']]});
  if (!existing.includes(SH.R)) headers.push({range:`${SH.R}!A1:B1`,values:[['BodyPart','WorkoutName']]});
  if (!existing.includes(SH.L)) headers.push({range:`${SH.L}!A1:K1`,values:[['LogID','SessionID','SessionDate','ClientName','BodyPart','WorkoutName','SetNum','Reps','WeightKg','LoggedAt','TrainerEmail']]});
  if (!existing.includes(SH.S)) headers.push({range:`${SH.S}!A1:E1`,values:[['SessionID','Date','Client','Notes','TrainerEmail']]});
  if (headers.length) await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:SID,
    resource:{valueInputOption:'USER_ENTERED',data:headers}});
  // Seed workout repo
  const rr = await getVals(`${SH.R}!A2:B`);
  if (!rr||!rr.length) {
    const rows=[];
    for (const [bp,wos] of Object.entries(DEFAULT_REPO)) wos.forEach(w=>rows.push([bp,w]));
    await appendVals(`${SH.R}!A:B`,rows);
  }
}

// ── USER REGISTRATION ──
// Users sheet = access control list (email + registeredAt only)
// All profile data (name, pic, role, phone) lives in Clients sheet
async function registerUser() {
  const [uRows, cRows] = await Promise.all([
    getVals(`${SH.U}!A2:B`),
    getVals(`${SH.C}!A2:H`)
  ]);
  // Build allUsers from Clients sheet (source of truth for profile)
  S.allUsers = cRows.filter(r=>r[4]).map(r=>({
    name:r[0]||'', phone:r[1]||'', active:(r[2]||'true').toString().toLowerCase(),
    trainerEmail:r[3]||'', email:(r[4]||'').toLowerCase(),
    role:r[5]||'client', pictureUrl:r[6]||'', registeredAt:r[7]||''
  }));
  const myEmail = S.user.email.toLowerCase();
  // Check if user is in Users sheet (access granted)
  const inUsers = uRows.find(r=>r[0]&&r[0].toLowerCase()===myEmail);
  // Get Clients profile
  const clientRow = S.allUsers.find(u=>u.email===myEmail);
  if (inUsers) {
    // Existing registered user — get role from Clients sheet
    S.userRole = clientRow ? clientRow.role : 'pending';
    S.myPhone  = clientRow ? clientRow.phone : '';
    // Update name + picture in Clients sheet from Google profile
    if (clientRow) {
      const allC=await getVals(`${SH.C}!A2:H`);
      const ci=allC.findIndex(r=>r[4]&&r[4].toLowerCase()===myEmail);
      if(ci>=0){
        await updateVals(`${SH.C}!G${ci+2}:G${ci+2}`,[[S.user.picture||'']]);
        clientRow.pictureUrl=S.user.picture||'';
      }
    }
  } else if (clientRow) {
    // Pre-added via Add Client — they exist in Clients sheet with a role
    // Add to Users sheet (they've now signed in = becomes Active)
    const ts=new Date().toISOString();
    await appendVals(`${SH.U}!A:B`,[[S.user.email, ts]]);
    // Update picture + flip Active=true (passive→active on first login)
    const allC=await getVals(`${SH.C}!A2:H`);
    const ci=allC.findIndex(r=>r[4]&&r[4].toLowerCase()===myEmail);
    if(ci>=0) {
      await updateVals(`${SH.C}!C${ci+2}:C${ci+2}`,[['TRUE']]);
      await updateVals(`${SH.C}!G${ci+2}:G${ci+2}`,[[S.user.picture||'']]);
      clientRow.active='true';
    }
    S.userRole = clientRow.role;
    S.myPhone  = clientRow.phone||'';
    clientRow.pictureUrl=S.user.picture||'';
  } else {
    // Brand new — never seen before
    const ts=new Date().toISOString();
    const isFirst = uRows.filter(r=>r[0]).length===0;
    const role = isFirst ? 'admin' : 'pending';
    // Add to Users sheet
    await appendVals(`${SH.U}!A:B`,[[S.user.email, ts]]);
    // Add to Clients sheet (so we have profile data)
    const name=S.user.name||S.user.given_name||'';
    await appendVals(`${SH.C}!A:H`,[[name,'',isFirst?'TRUE':'FALSE','',S.user.email,role,S.user.picture||'',ts]]);
    S.userRole = role;
    S.myPhone = '';
    // Reload allUsers
    const cRows2=await getVals(`${SH.C}!A2:H`);
    S.allUsers=cRows2.filter(r=>r[4]).map(r=>({
      name:r[0]||'',phone:r[1]||'',active:(r[2]||'true').toString().toLowerCase(),trainerEmail:r[3]||'',
      email:(r[4]||'').toLowerCase(),role:r[5]||'client',pictureUrl:r[6]||'',registeredAt:r[7]||''
    }));
  }
}

// ── SHEETS API ──
async function getVals(range) {
  const r=await gapi.client.sheets.spreadsheets.values.get({spreadsheetId:SID,range});
  return r.result.values||[];
}
async function appendVals(range,values) {
  return gapi.client.sheets.spreadsheets.values.append({spreadsheetId:SID,range,valueInputOption:'USER_ENTERED',resource:{values}});
}
async function updateVals(range,values) {
  return gapi.client.sheets.spreadsheets.values.update({spreadsheetId:SID,range,valueInputOption:'USER_ENTERED',resource:{values}});
}
async function getAllVals(sheet) { return getVals(`${sheet}!A:Z`); }

function activeEmail() {
  if (S.userRole==='admin') return null; // admin sees all
  return S.user.email;
}

async function loadClients() {
  const rows=await getVals(`${SH.C}!A2:H`);
  const email=activeEmail();
  S.clients=rows
    .filter(r=>r[0]&&(r[5]||'').toLowerCase()!=='deleted')
    .filter(r=>{
      if(S.userRole==='admin') return true;
      if((r[2]||'').toString().toLowerCase()==='false') return false;
      if(S.userRole==='trainer') return (r[3]||'')===email;
      if(S.userRole==='client') return (r[4]||'').toLowerCase()===email.toLowerCase();
      return true;
    })
    .map(r=>({
      name:r[0]||'', phone:r[1]||'', active:(r[2]||'true').toString().toLowerCase(),
      trainerEmail:r[3]||'', clientEmail:(r[4]||'').toLowerCase(),
      role:r[5]||'client', pictureUrl:r[6]||'', registeredAt:r[7]||''
    }));
  // allUsers = ALL users from Clients sheet (no active/role filter — just exclude deleted)
  // This is used for user management table, trainer dropdowns, profile lookups
  const allCRows = await getVals(`${SH.C}!A2:H`);
  S.allUsers=allCRows.filter(r=>r[0]&&(r[5]||'').toLowerCase()!=='deleted').map(r=>({
    name:r[0]||'',phone:r[1]||'',active:(r[2]||'true').toString().toLowerCase(),trainerEmail:r[3]||'',
    email:(r[4]||'').toLowerCase(),role:r[5]||'client',pictureUrl:r[6]||'',registeredAt:r[7]||''
  }));
}
async function loadRepo() {
  const rows=await getVals(`${SH.R}!A2:B`); S.repo={};
  rows.forEach(r=>{if(!r[0]||!r[1])return;const bp=r[0].trim(),w=r[1].trim();if(!S.repo[bp])S.repo[bp]=[];S.repo[bp].push(w);});
}
async function loadLogs() {
  const rows=await getVals(`${SH.L}!A2:K`);
  const email=activeEmail();
  S.logs=rows.filter(r=>r.length>=7).map(r=>{
    if(r.length>=11) return{logId:r[0],sessionId:r[1],date:r[2],client:r[3],bodyPart:r[4],workout:r[5],setNum:r[6],reps:r[7],weight:r[8],loggedAt:r[9],trainerEmail:r[10]||''};
    if(r.length>=10) return{logId:r[0],sessionId:r[1],date:r[2],client:r[3],bodyPart:r[4],workout:r[5],setNum:r[6],reps:r[7],weight:r[8],loggedAt:r[9],trainerEmail:''};
    return{logId:r[0],sessionId:r[0],date:r[1],client:r[2],bodyPart:r[3],workout:r[4],setNum:r[5],reps:r[6],weight:r[7],loggedAt:r[8]||'',trainerEmail:''};
  }).filter(l=>{
    if(!email) return true;
    if(S.userRole==='client') {
      const myRec=S.clients.find(cl=>cl.clientEmail===email.toLowerCase());
      return myRec&&l.client===myRec.name;
    }
    return l.trainerEmail===email||l.trainerEmail==='';
  });
}
async function loadSessions() {
  const rows=await getVals(`${SH.S}!A2:E`);
  const email=activeEmail();
  S.sessions=rows.filter(r=>r[0]).map(r=>({
    sessionId:r[0],date:r[1]||'',client:r[2]||'',notes:r[3]||'',trainerEmail:r[4]||''
  })).filter(s=>{
    if(!email) return true;
    if(S.userRole==='client') {
      const myRec=S.clients.find(cl=>cl.clientEmail===email.toLowerCase());
      return myRec&&s.client===myRec.name;
    }
    return s.trainerEmail===email||s.trainerEmail==='';
  });
}

async function saveProfileSheet() {
  const u=_psTarget;
  if(!u) return;
  const newName=document.getElementById('pse-name')?.value.trim()||u.name;
  const newPhone=document.getElementById('pse-phone')?.value.trim()||'';
  const newRole=document.getElementById('pse-role')?.value||u.role;
  const newTrainer=document.getElementById('pse-trainer')?.value||u.trainerEmail||'';
  showLoad(true);
  try {
    const emailKey=u.email||u.clientEmail||'';
    const allRows=await getVals(`${SH.C}!A2:H`);
    const idx=allRows.findIndex(r=>r[4]&&r[4].toLowerCase()===emailKey.toLowerCase());
    if(idx>=0){
      await updateVals(`${SH.C}!A${idx+2}:F${idx+2}`,[[newName,newPhone,allRows[idx][2]||'TRUE',newTrainer,emailKey,newRole]]);
    }
    // If self, also update myPhone
    if(!u.clientEmail) { S.myPhone=newPhone; }
    await loadClients();
    await loadAll();
    renderClientsList();
    // Update sheet hero data
    _psTarget={..._psTarget,name:newName,phone:newPhone,role:newRole,trainerEmail:newTrainer};
    renderProfileSheet();
    switchToViewMode();
    toast('Profile saved','success');
  } catch(e){console.error(e);toast('Save failed','error');}
  finally{showLoad(false);}
}

// ── CLIENTS ──
async function addClient() {
  const name=document.getElementById('nc-name').value.trim();
  const email=document.getElementById('nc-email').value.trim().toLowerCase();
  const phone=document.getElementById('nc-phone').value.trim();
  const roleEl=document.getElementById('nc-role');
  const role=roleEl?roleEl.value:'client';
  if (!name) { toast('Enter a name','error'); return; }
  if (!email||!email.includes('@')) { toast('Enter a valid email','error'); return; }
  if (S.clients.find(cl=>cl.name.toLowerCase()===name.toLowerCase())) { toast('Client name already exists','error'); return; }
  const allRows=await getVals(`${SH.C}!A2:H`);
  const dupEmail=allRows.find(r=>r[4]&&r[4].toLowerCase()===email&&(r[2]||'').toString().toLowerCase()!=='false');
  if (dupEmail) { toast('This email already exists','error'); return; }
  const trainerSel=document.getElementById('nc-trainer');
  const trainerEmail=trainerSel&&trainerSel.value?trainerSel.value:S.user.email;
  const ts=new Date().toISOString();
  // Active=true means they can log in; write all profile cols to Clients
  await appendVals(`${SH.C}!A:H`,[[name,phone,'TRUE',trainerEmail,email,role,'',ts]]);
  // Also grant access in Users sheet (email + ts only)
  const uRows=await getVals(`${SH.U}!A2:B`);
  const inUsers=uRows.find(r=>r[0]&&r[0].toLowerCase()===email);
  if(!inUsers) await appendVals(`${SH.U}!A:B`,[[email,ts]]);
  await loadClients();
  document.getElementById('nc-name').value='';
  document.getElementById('nc-email').value='';
  document.getElementById('nc-phone').value='';
  if(roleEl) roleEl.value='client';
  toggleAddClientForm();
  const _fabr=document.getElementById('fab-add-client');if(_fabr)_fabr.textContent='+';
  renderClientsList(); toast(name+' added as '+role,'success');
}
async function deleteClient(name) {
  const cl=S.clients.find(x=>x.name===name);
  if(!cl) return;

  if(!canDel){toast('No permission','error');return;}
  if(!confirm('Delete "'+name+'" and all their session logs? This cannot be undone.')) return;

  try {
    // Mark as deleted: role=deleted keeps data but removes from all lists
    const rows=await getVals(`${SH.C}!A2:H`);
    const idx=rows.findIndex(r=>r[0]===name);
    if(idx>=0) await updateVals(`${SH.C}!F${idx+2}`,[['deleted']]);

// ── SAVE SESSION ──
async function saveSession() {
  const date=document.getElementById('sess-date').value;
  const client=document.getElementById('sess-client').value;
  const notes=document.getElementById('sess-notes').value.trim();
  if (!date) { toast('Select a date','error'); return; }
  if (!client) { toast('Select a client','error'); return; }
  if (!S.sess.workouts.length) { toast('Add at least one workout','error'); return; }
  for (const wo of S.sess.workouts) {
    if (!wo.bodyPart||!wo.workout) { toast('Select body part and workout for all entries','error'); return; }
  }
  const btn=document.getElementById('btn-save');
  btn.disabled=true; btn.textContent='Saving...';
  const trainerEmail=S.viewAsEmail&&S.viewAsEmail!=='all'?S.viewAsEmail:S.user.email;
  try {
    const ts=new Date().toISOString();
    const isEdit=!!S.editingSessionId;
    // Check for existing session on same date+client (merge mode)
    // Normalize date to YYYY-MM-DD for reliable comparison (Sheets may return different formats)
    function normDate(d){
      if(!d) return '';
      // Already ISO: 2026-03-25
      if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
      // Try parsing and reformatting
      try{ const dt=new Date(d); if(!isNaN(dt)) return dt.toISOString().slice(0,10); }catch(_){}
      return d;
    }
    const normInputDate=normDate(date);
    const existingSameDay=!isEdit?S.sessions.find(s=>normDate(s.date)===normInputDate&&s.client.trim()===client.trim()):null;
    const isMerge=!!existingSameDay;
    const sid=isEdit?S.editingSessionId:isMerge?existingSameDay.sessionId:'S'+Date.now();
    if (isEdit) {
      // EDIT MODE: full replacement — blank old rows, write new ones
      const allLR=await getAllVals(SH.L);
      const toClear=[];
      allLR.forEach((row,i)=>{if(i>0&&row[1]===sid)toClear.push(i+1);});
      if(toClear.length){
        await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:SID,resource:{valueInputOption:'USER_ENTERED',
          data:toClear.map(rn=>({range:`${SH.L}!A${rn}:K${rn}`,values:[['','','','','','','','','','','']]})) }});
      }
      const allSR=await getAllVals(SH.S);
      const si=allSR.findIndex((row,i)=>i>0&&row[0]===sid);
      if(si>0) await updateVals(`${SH.S}!A${si+1}:E${si+1}`,[[sid,date,client,notes,trainerEmail]]);
      const logRows=[];let ri=0;
      S.sess.workouts.forEach(wo=>wo.sets.forEach((set,si2)=>{
        logRows.push([sid+'-'+ri++,sid,date,client,wo.bodyPart,wo.workout,si2+1,set.reps||'',set.weight||'',ts,trainerEmail]);
      }));
      await appendVals(`${SH.L}!A:K`,logRows);

    } else if(isMerge) {
      // MERGE MODE: never touch existing rows — only append truly new workouts
      // Use S.logs (in memory) to find what already exists for this session
      const existingInMem=S.logs.filter(l=>(l.sessionId||'').trim()===(sid||'').trim());
      const existingKeys=new Set(existingInMem.map(l=>l.bodyPart+'||'+l.workout));
      // Only keep workouts from new session that aren't already logged
      const newWorkouts=S.sess.workouts.filter(wo=>!existingKeys.has(wo.bodyPart+'||'+wo.workout));
      // Merge notes
      const mergedNotes=existingSameDay.notes&&notes&&existingSameDay.notes!==notes
        ?(existingSameDay.notes+' | '+notes):(notes||existingSameDay.notes||'');
      // Update session notes
      const allSR=await getAllVals(SH.S);
      const si=allSR.findIndex((row,i)=>i>0&&row[0]===sid);
      if(si>0) await updateVals(`${SH.S}!A${si+1}:E${si+1}`,[[sid,date,client,mergedNotes,trainerEmail]]);
      // Append only new workout rows (existing rows stay untouched)
      if(newWorkouts.length){
        const baseRi=existingInMem.length;
        const logRows=[];let ri=baseRi;
        newWorkouts.forEach(wo=>wo.sets.forEach((set,si2)=>{
          logRows.push([sid+'-'+ri++,sid,date,client,wo.bodyPart,wo.workout,si2+1,set.reps||'',set.weight||'',ts,trainerEmail]);
        }));
        await appendVals(`${SH.L}!A:K`,logRows);
      }
      // If all workouts already existed, nothing to do — still show merged toast

    } else {
      // NEW SESSION
      await appendVals(`${SH.S}!A:E`,[[sid,date,client,notes,trainerEmail]]);
      const logRows=[];let ri=0;
      S.sess.workouts.forEach(wo=>wo.sets.forEach((set,si2)=>{
        logRows.push([sid+'-'+ri++,sid,date,client,wo.bodyPart,wo.workout,si2+1,set.reps||'',set.weight||'',ts,trainerEmail]);
      }));
      await appendVals(`${SH.L}!A:K`,logRows);
    }
    await Promise.all([loadLogs(),loadSessions()]);
    toast(isEdit?'Session updated ✓':isMerge?'Merged into existing session ✓':'Session saved ✓','success');
    S.editingSessionId=null; resetSess();
    if (S.currentClient) { navigate('client-detail'); renderClientDetail(S.currentClient); }
    else navigate('clients');
  } catch(e) { console.error(e); toast('Save failed','error'); }
  finally { btn.disabled=false; btn.textContent='Save Session'; }
}

function resetSess() {
  S.sess={date:today(),client:S.currentClient||'',notes:'',workouts:[]};
  S.editingSessionId=null;
  document.getElementById('sess-date').value=today();
  document.getElementById('sess-client').value=S.currentClient||'';
  document.getElementById('sess-notes').value='';
  document.getElementById('log-title').textContent='Log Session';
  renderWoCards();
}

function editSession(sessionId) {
  const sess=S.sessions.find(s=>s.sessionId===sessionId);
  if (!sess) return;
  const sLogs=S.logs.filter(l=>l.sessionId===sessionId);
  const woMap={};
  sLogs.forEach(l=>{
    const key=l.bodyPart+'||'+l.workout;
    if(!woMap[key])woMap[key]={bodyPart:l.bodyPart,workout:l.workout,sets:[]};
    woMap[key].sets[+l.setNum-1]={reps:l.reps,weight:l.weight};
  });
  const workouts=Object.values(woMap).map(wo=>({...wo,sets:wo.sets.filter(Boolean)}));
  S.sess={date:sess.date,client:sess.client,notes:sess.notes,workouts};
  S.editingSessionId=sessionId;
  populateSel();
  document.getElementById('sess-date').value=sess.date;
  document.getElementById('sess-client').value=sess.client;
  document.getElementById('sess-notes').value=sess.notes;
  document.getElementById('log-title').textContent='Edit Session';
  document.getElementById('log-back-btn').onclick=()=>{ S.editingSessionId=null; navigate('client-detail'); renderClientDetail(S.currentClient); };
  renderWoCards();
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-view=log]').classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-log').classList.add('active');
}

async function deleteSession(sessionId) {
  if (!confirm('Delete this session? Cannot be undone.')) return;
  showLoad(true);
  try {
    const allSR=await getAllVals(SH.S);
    const si=allSR.findIndex((row,i)=>i>0&&row[0]===sessionId);
    if(si>0) await updateVals(`${SH.S}!A${si+1}:E${si+1}`,[['','','','','']]);
    const allLR=await getAllVals(SH.L);
    const toClear=[];
    allLR.forEach((row,i)=>{if(i>0&&row[1]===sessionId)toClear.push(i+1);});
    if(toClear.length) {
      await gapi.client.sheets.spreadsheets.values.batchUpdate({spreadsheetId:SID,resource:{valueInputOption:'USER_ENTERED',
        data:toClear.map(rn=>({range:`${SH.L}!A${rn}:K${rn}`,values:[['','','','','','','','','','','']]})) }});
    }
    await Promise.all([loadLogs(),loadSessions()]);
    renderClientDetail(S.currentClient);
    toast('Session deleted','success');
  } catch(e){ console.error(e); toast('Delete failed','error'); }
  finally { showLoad(false); }
}

        ).join('')+

  });
}

// ── RENDER USERS TABLE ──
function renderUsersTable() {
  const tbody=document.getElementById('users-tbody');
  if(!tbody) return;
  // Admin sees all; trainer sees only their assigned clients
  const others=S.allUsers.filter(u=>{
    if(u.email===S.user.email) return false;
    if(S.userRole==='admin') return true;
    return u.trainerEmail===S.user.email;
  });
  const sorted=[
    ...others.filter(u=>u.role==='pending'),
    ...others.filter(u=>u.role==='trainer'),
    ...others.filter(u=>u.role==='client'),
    ...others.filter(u=>u.role==='admin'),
    ...others.filter(u=>!['pending','trainer','client','admin','deleted'].includes(u.role||'')),
  ];
  tbody.innerHTML=sorted.map(u=>{
    const av=u.pictureUrl
      ?'<img class="user-row-avatar" src="'+u.pictureUrl+'">'
      :'<div class="user-row-avatar-ph">'+(u.name||u.email||'?').charAt(0).toUpperCase()+'</div>';
    const isPending=u.role==='pending';
    const notYet=!isPending&&!u.pictureUrl&&!u.registeredAt;
    const statusTag=isPending
      ?'<span style="font-size:10px;color:#a16207;background:#fef9c3;padding:1px 6px;border-radius:10px;margin-left:4px">pending</span>'
      :notYet
      ?'<span style="font-size:10px;color:#6b7280;background:#f3f4f6;padding:1px 6px;border-radius:10px;margin-left:4px">not signed in</span>'
      :'';
    const rolePill=u.role==='admin'
      ?'<span class="role-badge admin">Admin</span>'
      :u.role==='trainer'
      ?'<span class="role-badge" style="background:#f0fdf4;color:#16a34a">Trainer</span>'
      :u.role==='client'
      ?'<span class="role-badge user">Client</span>'
      :'<span style="font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px;background:#fef3c7;color:#d97706">Unassigned</span>';
    const del='<button class="btn-icon-sm btn-icon-del" title="Remove" onclick="removeUser(&quot;'+esc(u.email)+'&quot;)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>';
    let acts='';
    if(isPending){
      acts='<small style="color:var(--text3);margin-right:3px">Approve:</small>'+
        '<button style="font-size:10px;padding:2px 7px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:20px;cursor:pointer;margin-right:2px" onclick="setUserRole(&quot;'+esc(u.email)+'&quot;,&quot;trainer&quot;)">Trainer</button>'+
        '<button style="font-size:10px;padding:2px 7px;background:#e8effd;color:#1a56db;border:1px solid #bfdbfe;border-radius:20px;cursor:pointer;margin-right:2px" onclick="setUserRole(&quot;'+esc(u.email)+'&quot;,&quot;client&quot;)">Client</button>'+
        '<button style="font-size:10px;padding:2px 7px;background:#fef9c3;color:#a16207;border:1px solid #fde68a;border-radius:20px;cursor:pointer;margin-right:4px" onclick="approveAsAdmin(&quot;'+esc(u.email)+'&quot;)">Admin</button>'+del;
    }else if(u.role==='trainer'){
      acts='<button style="font-size:10px;padding:2px 7px;background:#fef9c3;color:#a16207;border:1px solid #fde68a;border-radius:20px;cursor:pointer;margin-right:4px" onclick="promoteToAdmin(&quot;'+esc(u.email)+'&quot;)">Make Admin</button>'+del;
    }else if(u.role==='client'){
      acts='<button style="font-size:10px;padding:2px 7px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:20px;cursor:pointer;margin-right:4px" onclick="setUserRole(&quot;'+esc(u.email)+'&quot;,&quot;trainer&quot;)">Make Trainer</button>'+del;
    }else{
      acts=del;
    }
    return '<tr>'+
      '<td>'+av+'</td>'+
      '<td style="font-weight:700;white-space:nowrap">'+escHtml(u.name||'—')+statusTag+
        (u.role!=='pending'?((u.active||'').toString().toLowerCase()==='true'
          ?'<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;background:#f0fdf4;color:#16a34a;margin-left:4px">Active</span>'
          :'<span style="font-size:9px;font-weight:700;padding:1px 5px;border-radius:20px;background:#f3f4f6;color:#6b7280;margin-left:4px">Passive</span>'):'')+'</td>'+
      '<td style="font-size:11px;color:var(--text3)">'+escHtml(u.email)+'</td>'+
      '<td>'+rolePill+'</td>'+
      '<td style="white-space:nowrap">'+acts+'</td>'+
    '</tr>';
  }).join('')||'<tr><td colspan="5" style="color:var(--text3);font-size:12px;padding:14px">No other users yet.</td></tr>';
}

function toggleProfileEdit() {
  const vm=document.getElementById('profile-view-mode');
  const em=document.getElementById('profile-edit-mode');
  const btn=document.getElementById('profile-edit-btn');
  if(em.style.display==='none'||em.style.display===''){
    // Switch to edit mode
    document.getElementById('my-name').value=S.user.name||S.user.given_name||'';
    document.getElementById('my-email').value=S.user.email||'';
    document.getElementById('my-phone').value=S.myPhone||'';
    const roleLabel=S.userRole==='admin'?'Admin':S.userRole==='trainer'?'Trainer':'Client';
    document.getElementById('my-role-display').value=roleLabel;
    vm.style.display='none';
    em.style.display='';
    btn.textContent='Cancel';

    // Back to view mode
    vm.style.display='';
    em.style.display='none';
    btn.textContent='Edit';
  }
}

// ── SAVE MY PROFILE ──
async function saveMyProfile() {
  const phone=document.getElementById('my-phone').value.trim();
  // Write phone to Clients sheet col B
  const rows=await getVals(`${SH.C}!A2:H`);
  const idx=rows.findIndex(r=>r[4]&&r[4].toLowerCase()===S.user.email.toLowerCase());
  if(idx>=0){
    await updateVals(`${SH.C}!B${idx+2}`,[[phone]]);
  }
  S.myPhone=phone;
  await loadClients();
  toggleProfileEdit();
  renderProfile();
  toast('Profile saved','success');
}

// ── EDIT CLIENT ──
let _editClientOrig = null;
function openEditClient(name) {
  const c=S.clients.find(x=>x.name===name);
  if (!c) return;
  _editClientOrig=name;
  document.getElementById('ec-name').value=c.name;
  document.getElementById('ec-email').value=c.clientEmail||'';
  document.getElementById('ec-phone').value=c.phone||'';
  // Pre-fill role from Clients sheet record
  const roleEl=document.getElementById('ec-role');
  if(roleEl) roleEl.value=c.role||'client';
  populateTrainerSels(null, c.trainerEmail);
  const etSel=document.getElementById('ec-trainer');
  if(etSel&&!etSel.disabled) etSel.value=c.trainerEmail||'';
  document.getElementById('edit-client-modal').classList.remove('hidden');
}
function closeEditClient() {
  document.getElementById('edit-client-modal').classList.add('hidden');
  _editClientOrig=null;
}
async function saveClientEdit() {
  const newName=document.getElementById('ec-name').value.trim();
  const newEmail=document.getElementById('ec-email').value.trim().toLowerCase();
  const newPhone=document.getElementById('ec-phone').value.trim();
  if (!newName) { toast('Name is required','error'); return; }
  if (!newEmail||!newEmail.includes('@')) { toast('Valid email required','error'); return; }
  // Check duplicate email (excluding self)
  const allRows=await getVals(`${SH.C}!A2:E`);
  const dupEmail=allRows.find(r=>r[4]&&r[4].toLowerCase()===newEmail&&r[0]!==_editClientOrig&&(r[2]||'').toString().toLowerCase()!=='false'&&r[0]!==newName);
  if (dupEmail) { toast('Email already used by another client','error'); return; }
  const idx=allRows.findIndex(r=>r[0]===_editClientOrig);
  if (idx<0) { toast('Client not found','error'); return; }
  const existing=allRows[idx];
  const newRole=document.getElementById('ec-role')?document.getElementById('ec-role').value:'client';
  // Write all profile cols to Clients sheet
  const etSel=document.getElementById('ec-trainer');
  const newTrainer=etSel&&etSel.value?etSel.value:(existing[3]||'');
  await updateVals(`${SH.C}!A${idx+2}:F${idx+2}`,[[newName,newPhone,existing[2]||'TRUE',newTrainer,newEmail,newRole]]);
  // Ensure Users sheet has their email (in case they weren't registered yet)
  const uRows=await getVals(`${SH.U}!A2:B`);
  if(!uRows.find(r=>r[0]&&r[0].toLowerCase()===newEmail)){
    await appendVals(`${SH.U}!A:B`,[[newEmail,new Date().toISOString()]]);
  }
  await loadClients();
  closeEditClient();
  renderClientsList();
  toast('Client updated','success');
}

function populateSel() {
  const grp=document.getElementById('client-sel-group');
  if (S.userRole==='client') {
    const mine=S.clients.find(cl=>cl.clientEmail===S.user.email);
    const myName=mine?mine.name:(S.user.name||S.user.given_name||'');
    document.getElementById('sess-client').innerHTML='<option value="'+esc(myName)+'">'+escHtml(myName)+'</option>';
    document.getElementById('sess-client').value=myName;
    if(grp) grp.style.display='none';
  } else {
    if(grp) grp.style.display='';
    const opts='<option value="">Select client...</option>'+S.clients.map(cl=>'<option value="'+esc(cl.name)+'">'+escHtml(cl.name)+'</option>').join('');
    document.getElementById('sess-client').innerHTML=opts;
  }
}

function openLogFor() {
  document.getElementById('log-back-btn').onclick=()=>{ S.editingSessionId=null; navigate('client-detail'); renderClientDetail(S.currentClient); };
  populateSel();
  document.getElementById('sess-client').value=S.currentClient||'';
  document.getElementById('log-title').textContent='Log Session';
  resetSess();

  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-view=log]').classList.add('active');

}

// ── NAV ──
function navigate(view,btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.bn-item').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const m=document.querySelector('[data-view="'+view+'"]');if(m)m.classList.add('active');}
  const _fabC=document.getElementById('fab-add-client');
  const _fabL=document.getElementById('fab-add-log');
  if(view==='clients'){renderClientsList();if(_fabC&&(S.userRole==='admin'||S.userRole==='trainer'))_fabC.classList.remove('hidden');if(_fabL)_fabL.classList.add('hidden');}
  else if(view==='client-detail'){if(_fabL&&(S.userRole==='admin'||S.userRole==='trainer'))_fabL.classList.remove('hidden');if(_fabC)_fabC.classList.add('hidden');}
  else{if(_fabC)_fabC.classList.add('hidden');if(_fabL)_fabL.classList.add('hidden');}
  if(view==='log'){populateSel();document.getElementById('log-back-btn').onclick=()=>navigate('clients');if(!S.sess.workouts.length)addWoCard();renderWoCards();}
  if(view==='workouts')renderWorkoutsRepo();
  if(view==='profile')renderProfile();
  if(view==='users'){renderUsersTable();}
  if(view==='users')renderUsersTable();
}

// ── UTILS ──
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){
  if(!d)return '\u2014';
  try{return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'2-digit'});}
  catch(_){return d;}
}
function showLoad(on){document.getElementById('loading').style.display=on?'flex':'none';}
function toast(msg,type='success'){
  const el=document.getElementById('toast'),t=document.createElement('div');
  t.className='t-item '+type;t.textContent=msg;el.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}
function esc(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
